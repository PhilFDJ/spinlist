<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GigConfirm · Sign in</title>
<link rel="icon" type="image/png" href="/icon.png?v=2">
<style>
  :root{--ink:#0f1720;--ink2:#16212e;--line2:#2c3a4a;--cream:#eef3f8;--muted:#93a3b4;--amber:#e8a13a;--go:#25d366;--stop:#e2614b;--navy:#0b1220}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--ink);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .card{width:340px;max-width:90vw;background:var(--ink2);border:1px solid var(--line2);border-radius:16px;padding:28px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:20px;color:var(--amber);margin-bottom:4px}
  .sub{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:22px}
  input{width:100%;padding:13px;border-radius:10px;border:1px solid var(--line2);background:var(--ink);color:var(--cream);font-size:15px;margin-bottom:12px}
  button{width:100%;padding:13px;border:none;border-radius:10px;background:var(--amber);color:var(--ink);font-weight:700;font-size:15px;cursor:pointer}
  .err{color:var(--stop);font-size:13px;min-height:18px;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><img src="/logo-light.png" alt="GigConfirm" style="height:44px;width:auto"></div>
  <div class="sub">Sign in</div>
  <input id="em" type="email" placeholder="Email" autofocus autocomplete="username" />
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password" />
  <button id="go">Sign in</button>
  <div class="err" id="err"></div>
  <div style="margin-top:16px;text-align:center;font-size:13px;color:var(--muted)">New here? <a href="/signup.html" style="color:var(--amber)">Create your agency</a></div>
</div>
<script>
async function login(){
  const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:document.getElementById("em").value,password:document.getElementById("pw").value})});
  if(r.ok){location.href="/dashboard.html";}
  else{const d=await r.json();document.getElementById("err").textContent=d.error||"Sign in failed.";}
}
document.getElementById("go").onclick=login;
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
document.getElementById("em").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("pw").focus();});
</script>
</body>
</html>
