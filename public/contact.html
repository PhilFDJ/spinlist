<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — GigConfirm</title>
<link rel="icon" type="image/png" href="/icon.png?v=2">
<style>
  :root{--ink:#0f1720;--ink2:#16212e;--line:#263341;--line2:#2c3a4a;--cream:#eef3f8;--muted:#93a3b4;--green:#25d366;--green2:#1fb457;--navy:#0b1220;--stop:#e2614b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.6}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px}
  header{display:flex;align-items:center;justify-content:space-between;padding:20px 0}
  header img{height:34px}
  .nav a{margin-left:20px;font-size:14px;color:var(--muted)}
  .nav a.btn{background:var(--green);color:var(--navy);padding:9px 18px;border-radius:9px;font-weight:700}
  .head{text-align:center;padding:56px 0 26px}
  .head h1{font-size:38px;line-height:1.1;letter-spacing:-.02em;margin-bottom:14px}
  .head h1 span{color:var(--green)}
  .head p{font-size:18px;color:var(--muted);max-width:600px;margin:0 auto}
  .panel{max-width:560px;margin:10px auto 60px;background:var(--ink2);border:1px solid var(--line2);border-radius:16px;padding:28px}
  label{display:block;font-size:13px;color:var(--muted);margin:14px 0 5px}
  input,textarea{width:100%;background:var(--ink);border:1px solid var(--line2);color:var(--cream);border-radius:9px;padding:11px 13px;font-size:15px;font-family:inherit}
  textarea{min-height:130px;resize:vertical}
  .btn-send{margin-top:18px;width:100%;background:var(--green);color:var(--navy);border:none;padding:14px;border-radius:11px;font-weight:800;font-size:16px;cursor:pointer}
  .btn-send:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:14px;text-align:center}
  .alt{text-align:center;color:var(--muted);font-size:14px;margin-top:18px}
  .alt a{color:var(--green);font-weight:600}
  footer{border-top:1px solid var(--line2);padding:30px 0;text-align:center;color:var(--muted);font-size:13px}
  @media(max-width:760px){.head h1{font-size:30px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/"><img src="/logo-light.png" alt="GigConfirm"></a>
    <nav class="nav">
      <a href="/GigConfirm-Guide.pdf" target="_blank" rel="noopener">Guide</a>
      <a href="/login.html">Sign in</a>
      <a href="/signup.html" class="btn">Get started</a>
    </nav>
  </header>

  <section class="head">
    <h1>Get in <span>touch</span></h1>
    <p>Questions about GigConfirm, want a hand getting set up, or thinking about using it for your agency? Send a message and it'll come straight to me.</p>
  </section>

  <div class="panel">
    <label for="name">Your name</label>
    <input id="name" type="text" placeholder="Your name" autocomplete="name">
    <label for="email">Your email</label>
    <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
    <label for="agency">Agency (optional)</label>
    <input id="agency" type="text" placeholder="Your agency's name" autocomplete="organization">
    <label for="message">Message</label>
    <textarea id="message" placeholder="How can I help?"></textarea>
    <button class="btn-send" id="sendBtn" onclick="submitContact()">Send message</button>
    <div class="msg" id="result"></div>
    <div class="alt">Prefer email? Write to <a href="mailto:phil@phil-freeman.co.uk">phil@phil-freeman.co.uk</a></div>
  </div>

  <footer>
    <div class="wrap">GigConfirm · <a href="/login.html">Sign in</a> · <a href="/signup.html">Create your agency</a> · <a href="/contact.html">Contact</a> · <a href="/GigConfirm-Guide.pdf" target="_blank" rel="noopener">User guide</a></div>
  </footer>
</div>

<script>
function $(id){return document.getElementById(id);}
async function submitContact(){
  const body={name:$("name").value.trim(),email:$("email").value.trim(),agency:$("agency").value.trim(),message:$("message").value.trim()};
  const out=$("result"),btn=$("sendBtn");
  if(!body.name||!body.email||!body.message){out.style.color="var(--stop)";out.textContent="Please fill in your name, email and message.";return;}
  btn.disabled=true;out.style.color="var(--muted)";out.textContent="Sending…";
  try{
    const r=await fetch("/api/contact",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok){out.style.color="var(--stop)";out.textContent=d.error||"Couldn't send.";btn.disabled=false;return;}
    out.style.color="var(--green)";out.textContent="✓ Thanks — your message has been sent. I'll be in touch soon.";
    ["name","email","agency","message"].forEach(id=>$(id).value="");
  }catch(_){out.style.color="var(--stop)";out.textContent="Couldn't send. Please email phil@phil-freeman.co.uk directly.";btn.disabled=false;}
}
</script>
</body>
</html>
