<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinlist — Plans for hosts</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png"><link rel="apple-touch-icon" sizes="180x180" href="/img/favicon-180.png">
<style>
  :root{--ink:#eaf0ff;--ink-2:#b6c2e0;--paper:#0a1228;--paper-2:#121d3d;--surface:#16234a;--neon:#c6f24e;--neon-dim:#a8d63f;--plum:#5b8cff;--coral:#ff6b5e;--muted:#7e8db5;--line:rgba(180,200,255,.16);--radius:14px;--shadow:0 18px 50px -22px rgba(0,0,0,.7)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  .display{font-family:"Archivo Black","Helvetica Neue",sans-serif;font-weight:900;letter-spacing:-.03em;line-height:.92}
  .eyebrow{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:700}
  header.bar{position:sticky;top:0;z-index:50;background:rgba(10,18,40,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:74px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:1.15rem;cursor:pointer;text-decoration:none;color:var(--ink)}
  .logo-img{height:54px;width:auto;display:block}
  .logo .dot{width:13px;height:13px;border-radius:50%;background:var(--neon);box-shadow:0 0 0 4px rgba(198,242,78,.25)}
  .bar nav{display:flex;gap:14px;align-items:center}
  .bar nav a{color:var(--ink);text-decoration:none;font-weight:600;font-size:.9rem}
  .btn{font:inherit;font-weight:700;border:0;border-radius:100px;padding:12px 22px;cursor:pointer;font-size:.92rem;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
  .btn:hover{transform:translateY(-2px)}
  .btn-primary{background:var(--ink);color:var(--paper);box-shadow:var(--shadow)}
  .btn-neon{background:var(--neon);color:#0a1228}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
  .hero{text-align:center;padding:70px 0 30px}
  .hero h1{font-size:clamp(2.6rem,7vw,4.6rem)}
  .hero p{margin-top:18px;color:var(--ink-2);font-size:1.1rem}
  .hero .free-note{margin-top:10px;color:var(--muted);font-size:.92rem}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin:40px auto 50px;max-width:680px}
  @media(max-width:820px){.grid{grid-template-columns:1fr;max-width:420px;margin-inline:auto}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px 26px;display:flex;flex-direction:column;position:relative}
  .card.pop{border-color:var(--plum);box-shadow:0 20px 50px -28px rgba(91,140,255,.5)}
  .card .tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--plum);color:#fff;font-size:.7rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:100px}
  .card h2{font-size:1.5rem;margin-bottom:4px}
  .card .blurb{color:var(--muted);font-size:.9rem;min-height:38px}
  .card .price{font-family:"Archivo Black",sans-serif;font-size:2.4rem;margin:16px 0 4px}
  .card ul{list-style:none;margin:18px 0 24px;display:flex;flex-direction:column;gap:10px}
  .card li{font-size:.92rem;display:flex;gap:9px;align-items:flex-start}
  .card li::before{content:"●";color:var(--neon-dim);font-size:.7rem;margin-top:5px}
  .card .btn{width:100%;justify-content:center;margin-top:auto}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(13,11,20,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:18px;padding:30px;max-width:400px;width:100%;box-shadow:var(--shadow)}
  .modal h3{font-size:1.4rem;margin-bottom:4px}
  .modal p.sub{color:var(--muted);font-size:.9rem;margin-bottom:20px}
  .modal label{display:block;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-2);margin:0 0 6px}
  .modal input{width:100%;font:inherit;font-size:1rem;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:14px;background:var(--paper-2);color:var(--ink)}
  .modal input:focus{outline:0;border-color:var(--plum);background:var(--paper-2);box-shadow:0 0 0 4px rgba(91,140,255,.18)}
  .modal .err{color:var(--coral);font-size:.86rem;margin-bottom:12px;display:none}
  .modal .switch{text-align:center;margin-top:16px;font-size:.88rem;color:var(--muted)}
  .modal .switch a{color:var(--plum);font-weight:700;cursor:pointer}
  .modal .x{float:right;cursor:pointer;color:var(--muted);font-size:1.3rem;line-height:1;border:0;background:0}
</style>
</head>
<body>
<header class="bar"><div class="wrap">
  <a class="logo" href="/"><img src="/img/spinlist-logo-dark.png" alt="Spinlist" class="logo-img"></a>
  <div id="spinlist-nav"></div>
  <div id="spinlist-acct" style="display:none"></div>
  <nav>
    <span id="nav-auth"></span>
  </nav>
</div></header>
<script src="/js/nav.js"></script>

<div class="wrap">
  <div class="hero">
    <p class="eyebrow">Pricing for hosts</p>
    <h1 class="display">Pick a plan,<br>start the party.</h1>
    <p>Hosts subscribe to create and share events — or redeem a complimentary code.</p>
    <p class="free-note">Your guests never pay and never sign in — they just vote.</p>
  </div>
  <div class="grid" id="plan-grid"></div>

  <!-- redeem a complimentary / discount code -->
  <div style="max-width:480px;margin:0 auto 70px;text-align:center">
    <p class="eyebrow" style="margin-bottom:10px">Have a code?</p>
    <div style="display:flex;gap:8px">
      <input id="redeem-input" placeholder="Enter complimentary or discount code"
        style="flex:1;text-transform:uppercase;font-family:ui-monospace,monospace">
      <button class="btn btn-neon" onclick="redeem()">Redeem</button>
    </div>
    <p id="redeem-msg" style="font-size:.9rem;margin-top:10px;min-height:20px"></p>
  </div>
</div>

<!-- auth modal -->
<div class="overlay" id="auth-overlay">
  <div class="modal">
    <button class="x" onclick="closeAuth()">×</button>
    <h3 id="auth-title">Create your host account</h3>
    <p class="sub" id="auth-sub">Free to start. Upgrade any time.</p>
    <div class="err" id="auth-err"></div>
    <div id="name-row"><label>Name</label><input id="a-name" placeholder="Your name"></div>
    <label>Email</label><input id="a-email" type="email" placeholder="you@email.com">
    <label>Password</label><input id="a-pass" type="password" placeholder="At least 8 characters">
    <button class="btn btn-neon" style="width:100%;justify-content:center" id="auth-submit" onclick="submitAuth()">Create account</button>
    <div class="switch" id="auth-switch"></div>
  </div>
</div>

<script>
let ME=null, PLANS=null, mode='signup', pendingPlan=null;

async function boot(){
  const [meR, plR]=await Promise.all([fetch('/api/me'),fetch('/api/plans')]);
  ME=(await meR.json()).user; PLANS=(await plR.json()).plans;
  renderNav(); renderPlans();
  const params=new URLSearchParams(location.search);
  if(params.get('checkout')==='cancelled')flash('Checkout cancelled — no charge made.');
}
function renderNav(){
  const el=document.getElementById('nav-auth');
  if(ME){el.innerHTML=`<a href="/account.html">Account</a> <a class="btn btn-ghost" style="padding:8px 16px" href="#" onclick="logout();return false">Log out</a>`;}
  else{el.innerHTML=`<a href="#" onclick="openAuth('login');return false">Log in</a> <a class="btn btn-primary" style="padding:8px 16px" href="#" onclick="openAuth('signup');return false">Sign up</a>`;}
}
function renderPlans(){
  const order=['pro','studio','prowedding','proweddingmulti'];   // purchasable plans, cheapest first
  document.getElementById('plan-grid').innerHTML=order.map(id=>{
    const p=PLANS[id];if(!p)return '';const current=ME&&ME.plan===id;
    const cta = current?'Current plan':'Choose '+p.name;
    return `<div class="card ${p.popular?'pop':''}">
      ${p.popular?'<div class="tag">PRO WEDDING TIER</div>':''}
      <h2>${p.name}</h2>
      <div class="blurb">${p.blurb}</div>
      <div class="price">${p.priceLabel}</div>
      <ul>${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
      <button class="btn ${p.popular?'btn-neon':'btn-primary'}" ${current?'disabled':''}
        onclick="choose('${id}')">${cta}</button>
    </div>`;
  }).join('');
}
function choose(planId){
  if(!ME){ pendingPlan=planId; openAuth('signup'); return; }
  startCheckout(planId);
}
async function startCheckout(planId){
  const r=await fetch('/api/billing/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan:planId})});
  const d=await r.json();
  if(d.url){location.href=d.url;}
  else{flash(d.error||'Could not start checkout.');}
}

/* ---- auth modal ---- */
function openAuth(m){mode=m;document.getElementById('auth-err').style.display='none';
  document.getElementById('name-row').style.display=m==='signup'?'block':'none';
  document.getElementById('auth-title').textContent=m==='signup'?'Create your host account':'Welcome back';
  document.getElementById('auth-sub').textContent=m==='signup'?'Free to start. Upgrade any time.':'Log in to manage your events.';
  document.getElementById('auth-submit').textContent=m==='signup'?'Create account':'Log in';
  document.getElementById('auth-switch').innerHTML=m==='signup'
    ?`Already have an account? <a onclick="openAuth('login')">Log in</a>`
    :`New here? <a onclick="openAuth('signup')">Create an account</a>`;
  document.getElementById('auth-overlay').classList.add('show');
}
function closeAuth(){document.getElementById('auth-overlay').classList.remove('show');pendingPlan=null;}
async function submitAuth(){
  const email=document.getElementById('a-email').value.trim();
  const password=document.getElementById('a-pass').value;
  const name=document.getElementById('a-name').value.trim();
  const ep=mode==='signup'?'/api/auth/signup':'/api/auth/login';
  const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,name})});
  const d=await r.json();
  if(!r.ok){const e=document.getElementById('auth-err');e.textContent=d.error;e.style.display='block';return;}
  ME=d.user; closeAuth(); renderNav(); renderPlans();
  if(pendingPlan){const pl=pendingPlan;pendingPlan=null;startCheckout(pl);}
}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});ME=null;renderNav();renderPlans();}
function flash(msg){alert(msg);} // simple; swap for a toast if you like

async function redeem(){
  const msg=document.getElementById('redeem-msg');
  const code=document.getElementById('redeem-input').value.trim().toUpperCase();
  if(!code){msg.style.color='var(--muted)';msg.textContent='Enter a code first.';return;}
  if(!ME){ pendingPlan=null; openAuth('signup'); return; }   // must be signed in
  msg.style.color='var(--muted)';msg.textContent='Checking…';
  const r=await fetch('/api/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
  const d=await r.json();
  if(!r.ok){msg.style.color='var(--coral)';msg.textContent=d.error||'Could not redeem.';return;}
  if(d.type==='comp'||d.type==='addon'){
    msg.style.color='var(--neon-dim)';msg.textContent=d.message+' Redirecting…';
    setTimeout(()=>location.href='/',1200);
  }else{
    // discount: send them to checkout where Stripe applies the promo code
    msg.style.color='var(--neon-dim)';msg.textContent=d.message;
  }
}
boot();
</script>
</body>
</html>
