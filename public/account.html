<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinlist — Your account</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png"><link rel="apple-touch-icon" sizes="180x180" href="/img/favicon-180.png">
<style>
  :root{--ink:#eaf0ff;--ink-2:#b6c2e0;--paper:#0a1228;--paper-2:#121d3d;--surface:#16234a;--neon:#c6f24e;--neon-dim:#a8d63f;--plum:#5b8cff;--coral:#ff6b5e;--muted:#7e8db5;--line:rgba(180,200,255,.16);--shadow:0 18px 50px -22px rgba(0,0,0,.7)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink)}
  .wrap{max-width:720px;margin:0 auto;padding:0 22px}
  .display{font-family:"Archivo Black","Helvetica Neue",sans-serif;font-weight:900;letter-spacing:-.03em}
  .eyebrow{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:700}
  header.bar{background:rgba(10,18,40,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:1080px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:1.15rem;text-decoration:none;color:var(--ink)}
  .logo-img{height:54px;width:auto;display:block}
  .logo .dot{width:13px;height:13px;border-radius:50%;background:var(--neon);box-shadow:0 0 0 4px rgba(198,242,78,.25)}
  .bar nav a{color:var(--ink);text-decoration:none;font-weight:600;font-size:.9rem;margin-left:14px}
  .btn{font:inherit;font-weight:700;border:0;border-radius:100px;padding:12px 22px;cursor:pointer;font-size:.92rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:transform .15s}
  .btn:hover{transform:translateY(-2px)}
  .btn-primary{background:var(--ink);color:var(--paper);box-shadow:var(--shadow)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;margin-top:24px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .k{color:var(--muted);font-size:.9rem}
  .row .v{font-weight:700}
  .pill{display:inline-block;background:var(--neon);color:#0a1228;font-weight:800;font-size:.74rem;padding:4px 12px;border-radius:100px;text-transform:uppercase;letter-spacing:.06em}
  .pill.warn{background:var(--coral);color:#fff}
  .meter{height:10px;background:var(--paper-2);border-radius:100px;overflow:hidden;margin-top:8px}
  .meter .fill{height:100%;background:linear-gradient(90deg,var(--plum),var(--neon))}
  h1{font-size:2.2rem;margin-top:30px}
  .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
  .signed-out{text-align:center;padding:80px 20px;color:var(--muted)}
</style>
</head>
<body>
<header class="bar"><div class="wrap">
  <a class="logo" href="/"><img src="/img/spinlist-logo-dark.png" alt="Spinlist" class="logo-img"></a>
  <div id="spinlist-nav"></div>
  <nav><a href="/pricing.html">Plans</a><a href="#" onclick="logout();return false">Log out</a></nav>
</div></header>
<script src="/js/nav.js"></script>

<div class="wrap" id="root"><p style="margin-top:40px;color:var(--muted)">Loading…</p></div>

<script>
// ======================================================================
//  Desktop app download links. Paste new release URLs here when you rebuild
//  (the ONLY place to change them). Leave a URL blank to show "coming soon".
const MAC_APP_URL = 'https://github.com/PhilFDJ/Spinlist-Music-Manager/releases/download/v1.3.0/Spinlist.Music.Manager-1.3.0-universal.dmg';
const WIN_APP_URL = 'https://github.com/PhilFDJ/Spinlist-Music-Manager/releases/download/v1.3.0/Spinlist.Music.Manager.Setup.1.3.0.exe';
// ======================================================================
async function boot(){
  // Handle return from Spotify OAuth
  const sp=new URLSearchParams(location.search).get('spotify');
  if(sp){
    const msgs={connected:'✓ Spotify connected! You can now export playlists from your events.',denied:'Spotify connection was cancelled.',failed:'Spotify connection failed — please try again.',invalid:'Spotify session expired — please try again.'};
    setTimeout(()=>{const n=document.getElementById('spotify-return');if(n){n.textContent=msgs[sp]||'';n.style.display=msgs[sp]?'block':'none';}},100);
    history.replaceState({},'','/account.html');
  }
  const r=await fetch('/api/me');const d=await r.json();
  const root=document.getElementById('root');
  if(!d.user){root.innerHTML=`<div class="signed-out"><h1 class="display">You're signed out</h1><p style="margin:14px 0 22px">Log in to manage your plan.</p><a class="btn btn-primary" href="/pricing.html">Go to plans</a></div>`;return;}
  const plan=d.plan, used=d.eventsThisMonth||0;
  const cap=plan.maxEventsPerMonth;
  const capLabel=cap===null?'Unlimited':cap;
  const near=cap!==null&&used>=cap;
  const pct=cap===null?15:Math.min(100,Math.round(used/cap*100));
  const status=d.user.sub_status||'—';
  const statusWarn=['past_due','canceled'].includes(status);
  const isComp=status==='comp';
  const isTrial=d.user.plan==='trial';
  const trialCap=(plan.maxEventsLifetime)||2;
  const trialUsed=d.eventsLifetime||0;
  const trialLeft=Math.max(0,trialCap-trialUsed);
  const trialEnded=isTrial&&trialLeft<=0;
  const noPlan=d.user.plan==='none'||!d.user.plan;
  const hasBranding=!!plan.branding;
  const b=d.branding||{};
  window.__brandColor=b.color||'#5b8cff';
  const compLine = isComp
    ? `<div class="row"><span class="k">Complimentary access</span><span class="v">${d.compUntil?('until '+new Date(d.compUntil).toLocaleDateString()):'no expiry'}</span></div>`
    : '';
  root.innerHTML=`
    <h1 class="display">Your account</h1>
    <div class="panel">
      <div class="row"><span class="k">Signed in as</span><span class="v">${esc(d.user.email)}</span></div>
      <div class="row"><span class="k">Current plan</span><span class="v"><span class="pill ${statusWarn?'warn':''}" ${isComp?'style="background:var(--neon);color:#0a1228"':''}>${esc(plan.name)}${isComp?' (comp)':''}</span></span></div>
      <div class="row"><span class="k">Status</span><span class="v">${esc(status)}</span></div>
      ${compLine}
      ${isTrial ? `
      <div class="row" style="display:block">
        <div style="display:flex;justify-content:space-between"><span class="k">Free trial events used</span><span class="v">${trialUsed} / ${trialCap}</span></div>
        <div class="meter"><div class="fill" style="width:${Math.min(100,Math.round(trialUsed/trialCap*100))}%"></div></div>
        ${trialEnded
          ? '<p style="color:var(--coral);font-size:.88rem;margin-top:10px">Your free trial is used up. Subscribe to keep creating events.</p><a class="btn btn-primary" href="/pricing.html" style="margin-top:10px">Choose a plan ▸</a>'
          : `<p style="color:var(--ink-2);font-size:.88rem;margin-top:10px">You have <b>${trialLeft}</b> free event${trialLeft===1?'':'s'} left — all features included. <a href="/pricing.html" style="color:var(--plum);font-weight:700">See plans</a> for unlimited.</p>`}
      </div>` : noPlan ? `
      <div class="row" style="display:block">
        <p style="color:var(--ink-2);margin-bottom:12px">You don't have an active plan yet. Subscribe or redeem a complimentary code to start hosting.</p>
        <a class="btn btn-primary" href="/pricing.html">See plans &amp; redeem a code</a>
      </div>` : `
      <div class="row" style="display:block">
        <div style="display:flex;justify-content:space-between"><span class="k">Events this month</span><span class="v">${used} / ${capLabel}</span></div>
        <div class="meter"><div class="fill" style="width:${pct}%"></div></div>
        ${near?'<p style="color:var(--coral);font-size:.85rem;margin-top:8px">You\'ve hit your monthly limit — upgrade to create more.</p>':''}
      </div>`}
    </div>

    ${d.isAdmin ? '<div style="margin-top:16px"><a class="btn btn-ghost" href="/admin.html">Admin · manage codes →</a></div>' : ''}

    <h2 style="margin-top:34px;font-size:1.4rem">Redeem a code</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-top:4px">Enter a complimentary or discount code.</p>
    <div class="panel">
      <div style="display:flex;gap:8px">
        <input id="redeem-input" placeholder="Enter code" style="flex:1;text-transform:uppercase;font-family:ui-monospace,monospace;font:inherit;padding:11px 13px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--ink)">
        <button class="btn btn-neon" onclick="redeemCode()">Redeem</button>
      </div>
      <p id="redeem-msg" style="font-size:.9rem;margin-top:10px;min-height:18px"></p>
    </div>

    <h2 style="margin-top:34px;font-size:1.4rem">Branding</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-top:4px">Your logo, accent colour and tagline appear on the guest voting page and the DJ PDF.</p>
    ${hasBranding ? `
      <div class="panel">
        <label style="display:block;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-2);margin-bottom:8px">Logo</label>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px">
          <div id="logo-preview" style="width:84px;height:84px;border-radius:12px;border:1px solid var(--line);background:var(--paper-2) center/contain no-repeat;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.7rem;text-align:center;overflow:hidden">${b.logo?`<img src="${esc(b.logo)}" style="max-width:100%;max-height:100%">`:'No logo'}</div>
          <div>
            <input type="file" id="logo-file" accept="image/png,image/jpeg,image/webp,image/svg+xml" style="font-size:.85rem">
            <p style="color:var(--muted);font-size:.78rem;margin-top:6px">PNG, JPG, WebP or SVG · up to 2&nbsp;MB</p>
          </div>
        </div>

        <label style="display:block;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-2);margin-bottom:8px">Accent colour</label>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <input type="color" id="brand-color" value="${esc(b.color||'#5b8cff')}" style="width:54px;height:40px;border:1px solid var(--line);border-radius:8px;background:none;cursor:pointer">
          <input type="text" id="brand-color-hex" value="${esc(b.color||'#5b8cff')}" maxlength="7" style="width:120px;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--ink)">
        </div>

        <label style="display:block;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-2);margin-bottom:8px">Tagline</label>
        <input type="text" id="brand-tagline" maxlength="80" placeholder="e.g. Powered by Marco's Mobile Disco" value="${esc(b.tagline||'')}" style="width:100%;font:inherit;padding:11px 13px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--ink);margin-bottom:6px">
        <p style="color:var(--muted);font-size:.78rem">Up to 80 characters.</p>

        <div id="brand-msg" style="margin-top:14px;font-size:.88rem"></div>
        <div style="display:flex;gap:12px;margin-top:14px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="saveBranding()">Save branding</button>
          ${(b.logo||b.color||b.tagline)?'<button class="btn btn-ghost" onclick="clearBranding()">Remove branding</button>':''}
        </div>
      </div>
    ` : `
      <div class="panel" style="text-align:center;padding:34px">
        <p style="font-size:1.05rem;margin-bottom:6px">Custom branding is a BASIC feature.</p>
        <p style="color:var(--muted);font-size:.9rem;margin-bottom:18px">Add your logo, colour and tagline to every event you share.</p>
        <a class="btn btn-primary" href="/pricing.html">See BASIC &amp; PRO</a>
      </div>
    `}

    <div id="spotify-return" style="display:none;background:rgba(30,215,96,.14);border:1px solid rgba(30,215,96,.5);color:#1ed760;padding:12px 16px;border-radius:10px;font-size:.9rem;margin:18px 0"></div>

    ${plan.spotifyExport ? `
      <div class="panel">
        <h2>Spotify export</h2>
        <p style="color:var(--muted);font-size:.9rem;margin:4px 0 16px">Connect your Spotify account so you can push an event's voted songs straight into a new playlist.</p>
        <div id="spotify-box"><p style="color:var(--muted);font-size:.9rem">Checking…</p></div>
      </div>
    ` : ''}

    ${d.user.emailInvites ? `
      <div class="panel">
        <h2>Email invites (Resend)</h2>
        <p style="color:var(--muted);font-size:.9rem;margin:4px 0 14px">Connect your own <a href="https://resend.com" target="_blank" rel="noopener" style="color:var(--plum)">Resend</a> account to email wedding invites to couples and login details to your DJs, from your own address.</p>
        <div id="resend-box"><p style="color:var(--muted);font-size:.9rem">Checking…</p></div>
      </div>

      <div class="panel">
        <h2>Daily round-up email</h2>
        <p style="color:var(--muted);font-size:.9rem;margin:4px 0 14px">Get one email a day summarising everything your couples updated — songs, timelines and questionnaire answers — from the previous day. Sent from your connected email (above).</p>
        <label style="display:flex;align-items:center;gap:12px;cursor:pointer">
          <input type="checkbox" id="digest-toggle" ${d.user.dailyDigest ? 'checked' : ''} onchange="toggleDigest(this.checked)" style="width:18px;height:18px;accent-color:var(--plum)">
          <span style="font-size:.95rem">Email me a daily round-up of couple activity</span>
        </label>
        <p id="digest-msg" style="font-size:.85rem;color:var(--muted);margin-top:8px;min-height:16px"></p>
      </div>
    ` : ''}

    ${d.user.prepAccess ? `
      <div class="panel">
        <h2>Music library</h2>
        <p style="color:var(--muted);font-size:.9rem;margin:4px 0 14px">Set up your music library with the Spinlist desktop app — it scans your folder fast and reads your files' real locations, so the playlists you export drop straight into your DJ software. It syncs to your account automatically, then Prep uses it inside every wedding.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn btn-primary" id="mac-app-btn" href="${MAC_APP_URL || '#'}" ${MAC_APP_URL ? 'target="_blank" rel="noopener"' : 'onclick="return false"'} style="text-decoration:none">⬇ Download for Mac</a>
          <a class="btn btn-primary" id="win-app-btn" href="${WIN_APP_URL || '#'}" ${WIN_APP_URL ? 'target="_blank" rel="noopener"' : 'onclick="return false"'} style="text-decoration:none">⬇ Download for Windows</a>
        </div>
        <p id="mac-app-note" style="color:var(--muted);font-size:.82rem;margin-top:10px">
          <b>Mac:</b> ${MAC_APP_URL ? 'open the .dmg and drag Spinlist Music Manager into Applications, then open it — no security warning.' : 'coming soon.'}<br>
          <b>Windows:</b> ${WIN_APP_URL ? 'run the installer; if Windows shows a “protected your PC” notice, click More info → Run anyway.' : 'coming soon.'}
        </p>
        <div style="margin-top:12px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.03)">
          <p style="margin:0;font-size:.82rem;color:var(--ink)">🔒 <b>Your privacy:</b> we store your track list and file locations (titles, artists, file paths) — never your actual music files. Nothing is copied off your computer, and your songs stay exactly where they are.</p>
        </div>
      </div>
    ` : ''}

    <div class="actions">
      <a class="btn btn-primary" href="/">Create an event</a>
      ${(noPlan||isComp||isTrial)
        ? '<a class="btn btn-ghost" href="/pricing.html">See plans</a>'
        : '<button class="btn btn-ghost" onclick="portal()">Manage billing</button>'}
    </div>`;

  // keep the colour picker and hex box in sync
  const cp=document.getElementById('brand-color'), hx=document.getElementById('brand-color-hex');
  if(cp&&hx){
    cp.addEventListener('input',()=>{hx.value=cp.value;});
    hx.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(hx.value))cp.value=hx.value;});
  }
  const lf=document.getElementById('logo-file');
  if(lf)lf.addEventListener('change',()=>{
    const f=lf.files[0];if(!f)return;
    const url=URL.createObjectURL(f);
    document.getElementById('logo-preview').innerHTML=`<img src="${url}" style="max-width:100%;max-height:100%">`;
  });
  if(plan.spotifyExport)loadSpotify();
  if(d.user.emailInvites)loadResend();
}

async function toggleDigest(on){
  const msg=document.getElementById('digest-msg');
  if(msg){msg.style.color='var(--muted)';msg.textContent='Saving…';}
  try{
    const r=await fetch('/api/notifications/digest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({on:!!on})});
    if(!r.ok)throw new Error('failed');
    if(msg){msg.textContent=on?'On — you\u2019ll get a daily round-up when there\u2019s activity.':'Off — no daily emails.';}
  }catch(e){
    if(msg){msg.style.color='#ff6b5e';msg.textContent='Could not save — please try again.';}
    const t=document.getElementById('digest-toggle');if(t)t.checked=!on;
  }
}
async function loadResend(){
  const box=document.getElementById('resend-box');if(!box)return;
  let s={};
  try{ s=await (await fetch('/api/resend/status')).json(); }catch(e){ box.textContent='Could not load.'; return; }
  const inp='font:inherit;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--ink);width:100%';
  if(s.connected||s.inherited){
    box.innerHTML=`
      <div style="background:rgba(30,215,96,.12);border:1px solid rgba(30,215,96,.4);color:#1ed760;padding:10px 14px;border-radius:8px;font-size:.9rem;margin-bottom:14px">✓ ${s.inherited?'Using your team owner&#39;s Resend setup':'Resend connected'}${s.from?(' · sending from <b>'+esc(s.from)+'</b>'):''}${s.hint?(' · key '+esc(s.hint)):''}</div>
      ${s.inherited?'':`
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="testResend(this)">Send test email</button>
        <button class="btn btn-ghost" onclick="editResend()">Edit settings</button>
        <button class="btn btn-ghost" onclick="clearResend()" style="color:var(--coral);border-color:var(--coral)">Disconnect</button>
      </div>`}
      <p id="resend-msg" style="font-size:.88rem;margin-top:12px;min-height:16px"></p>
      <div id="resend-form" style="display:none;margin-top:14px"></div>`;
  }else{
    box.innerHTML=`<div id="resend-form"></div>`;
    renderResendForm();
  }
}
function resendFormHtml(){
  const inp='font:inherit;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--ink);width:100%';
  return `
    <label style="display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:5px">Resend API key</label>
    <input id="r-key" type="password" placeholder="re_..." style="${inp};margin-bottom:12px" autocomplete="off">
    <label style="display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:5px">From address (must be on your verified Resend domain)</label>
    <input id="r-from" placeholder="invites@yourdomain.com" style="${inp};margin-bottom:12px">
    <label style="display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:5px">From name (optional)</label>
    <input id="r-name" placeholder="e.g. Marco's Mobile Disco" style="${inp};margin-bottom:14px">
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px">In Resend, add & verify your domain (SPF/DKIM DNS records), then create a <b>send-only</b> API key restricted to that domain. Your key is stored securely and never shown again. <a href="https://resend.com/docs/dashboard/domains/introduction" target="_blank" rel="noopener" style="color:var(--plum)">Domain setup guide →</a></p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="saveResend()">Save & connect</button>
      <button class="btn btn-ghost" onclick="loadResend()">Cancel</button>
    </div>
    <p id="resend-msg" style="font-size:.88rem;margin-top:12px;min-height:16px"></p>`;
}
function renderResendForm(){ const f=document.getElementById('resend-form'); if(f){f.style.display='block';f.innerHTML=resendFormHtml();} }
function editResend(){ renderResendForm(); }
async function saveResend(){
  const msg=document.getElementById('resend-msg');msg.style.color='var(--muted)';msg.textContent='Saving…';
  const apiKey=document.getElementById('r-key').value.trim();
  const from=document.getElementById('r-from').value.trim();
  const fromName=document.getElementById('r-name').value.trim();
  const r=await fetch('/api/resend/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,from,fromName})});
  const d=await r.json().catch(()=>({}));
  if(!r.ok){msg.style.color='var(--coral)';msg.textContent=d.error||'Could not save.';return;}
  loadResend();
}
async function testResend(btn){
  const msg=document.getElementById('resend-msg');msg.style.color='var(--muted)';msg.textContent='Sending test…';
  if(btn)btn.disabled=true;
  const r=await fetch('/api/resend/test',{method:'POST'});
  const d=await r.json().catch(()=>({}));
  if(btn)btn.disabled=false;
  if(!r.ok){msg.style.color='var(--coral)';msg.textContent=d.error||'Test failed.';return;}
  msg.style.color='#1ed760';msg.textContent='✓ Test email sent — check your inbox.';
}
async function clearResend(){
  if(!confirm('Disconnect Resend? Email invites will fall back to opening your own email app.'))return;
  await fetch('/api/resend/config',{method:'DELETE'});
  loadResend();
}

async function loadSpotify(){
  const box=document.getElementById('spotify-box');if(!box)return;
  try{
    const r=await fetch('/api/spotify/status');const d=await r.json();
    if(d.connected){
      box.innerHTML=`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="color:#1ed760;font-weight:700">✓ Connected${d.spotifyUserId?(' as '+esc(d.spotifyUserId)):''}</span>
        <button class="btn btn-ghost" onclick="disconnectSpotify()" style="padding:8px 14px;font-size:.85rem">Disconnect</button>
      </div>
      <p style="color:var(--muted);font-size:.85rem;margin-top:10px">On any event's host page, tap <b>Export to Spotify</b> to create a playlist.</p>`;
    }else{
      box.innerHTML=`<button class="btn btn-neon" onclick="connectSpotify()">Connect Spotify</button>`;
    }
  }catch(e){ box.innerHTML='<p style="color:var(--muted);font-size:.9rem">Could not check Spotify status.</p>'; }
}
async function connectSpotify(){
  try{
    const r=await fetch('/api/spotify/connect');const d=await r.json();
    if(r.ok&&d.url){location.href=d.url;}else alert(d.error||'Could not start Spotify connect.');
  }catch(e){ alert('Network error.'); }
}
async function disconnectSpotify(){
  await fetch('/api/spotify/disconnect',{method:'POST'});
  loadSpotify();
}

async function saveBranding(){
  const msg=document.getElementById('brand-msg');
  const fd=new FormData();
  const file=document.getElementById('logo-file').files[0];
  if(file)fd.append('logo',file);
  fd.append('color',document.getElementById('brand-color-hex').value.trim());
  fd.append('tagline',document.getElementById('brand-tagline').value.trim());
  msg.style.color='var(--muted)';msg.textContent='Saving…';
  const r=await fetch('/api/branding',{method:'POST',body:fd});
  const d=await r.json();
  if(!r.ok){msg.style.color='var(--coral)';msg.textContent=d.error||'Could not save.';return;}
  msg.style.color='var(--neon-dim)';msg.textContent='Branding saved. It will appear on new shares.';
}
async function clearBranding(){
  if(!confirm('Remove your logo, colour and tagline?'))return;
  await fetch('/api/branding',{method:'DELETE'});
  boot();
}
async function redeemCode(){
  const msg=document.getElementById('redeem-msg');
  const code=document.getElementById('redeem-input').value.trim().toUpperCase();
  if(!code){msg.style.color='var(--muted)';msg.textContent='Enter a code first.';return;}
  msg.style.color='var(--muted)';msg.textContent='Checking…';
  const r=await fetch('/api/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
  const d=await r.json();
  if(!r.ok){msg.style.color='var(--coral)';msg.textContent=d.error||'Could not redeem.';return;}
  msg.style.color='var(--neon-dim)';msg.textContent=d.message;
  if(d.type==='comp'||d.type==='addon')setTimeout(boot,1200);   // refresh to show new plan/perk
}
async function portal(){
  const r=await fetch('/api/billing/portal',{method:'POST'});const d=await r.json();
  if(d.url)location.href=d.url; else alert(d.error||'Could not open billing portal.');
}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});location.href='/';}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
boot();
</script>
