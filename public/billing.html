<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GigConfirm · Subscribe</title>
<link rel="icon" type="image/png" href="/icon.png?v=2">
<style>
  :root{--ink:#0f1720;--ink2:#16212e;--line2:#2c3a4a;--cream:#eef3f8;--muted:#93a3b4;--green:#25d366;--navy:#0b1220;--stop:#e2614b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--ink);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:24px}
  .card{width:460px;max-width:92vw;background:var(--ink2);border:1px solid var(--line2);border-radius:16px;padding:30px}
  .brand img{height:34px;margin-bottom:18px}
  h1{font-size:22px;margin:0 0 6px}
  p.sub{color:var(--muted);font-size:14px;margin:0 0 20px}
  .amt{font-size:34px;font-weight:800;margin:10px 0}
  .amt span{font-size:15px;color:var(--muted);font-weight:400}
  label{display:block;font-size:12px;color:var(--muted);margin:16px 0 6px}
  input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line2);background:var(--ink);color:var(--cream);font-size:15px}
  .codeline{display:flex;gap:8px}
  .codeline input{flex:1}
  .codeline button{background:transparent;border:1px solid var(--line2);color:var(--cream);border-radius:10px;padding:0 16px;cursor:pointer}
  .codemsg{font-size:12px;min-height:16px;margin-top:6px}
  button.go{width:100%;padding:14px;border:none;border-radius:11px;background:var(--green);color:var(--navy);font-weight:800;font-size:16px;cursor:pointer;margin-top:22px}
  button.go:disabled{opacity:.5}
  .err{color:var(--stop);font-size:13px;min-height:18px;margin-top:10px}
  .signout{display:block;text-align:center;margin-top:16px;color:var(--muted);font-size:13px}
  a{color:var(--green)}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><img src="/logo-light.png" alt="GigConfirm"></div>
  <h1>Subscribe to GigConfirm</h1>
  <p class="sub">Your agency needs an active subscription to send confirmations. Cancel anytime.</p>
  <div class="amt" id="priceAmt">&pound;—<span>/month</span></div>

  <label>Discount code (optional)</label>
  <div class="codeline">
    <input id="code" placeholder="Enter a code" autocomplete="off" />
    <button onclick="checkCode()">Apply</button>
  </div>
  <div class="codemsg" id="codeMsg"></div>

  <button class="go" id="go" onclick="subscribe()">Continue to payment</button>
  <div class="err" id="err"></div>
  <a class="signout" href="#" onclick="logout()">Sign out</a>
</div>
<script>
  const $=id=>document.getElementById(id);
  let appliedCode="";

  // If they arrived here after cancelling checkout, show a gentle note.
  if(location.search.includes("sub=cancelled")){$("err").textContent="Checkout cancelled — you can try again when ready.";}

  async function checkCode(){
    const code=$("code").value.trim();
    if(!code){$("codeMsg").textContent="";appliedCode="";return;}
    const d=await (await fetch("/api/check-code?code="+encodeURIComponent(code))).json();
    if(d.valid){appliedCode=code;$("codeMsg").style.color="var(--green)";$("codeMsg").textContent="✓ "+d.description;}
    else{appliedCode="";$("codeMsg").style.color="var(--stop)";$("codeMsg").textContent=d.reason||"Not a valid code.";}
  }
  async function subscribe(){
    $("err").textContent="";$("go").disabled=true;
    try{
      const r=await fetch("/api/create-checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:appliedCode})});
      const d=await r.json();
      if(r.ok&&d.url){location.href=d.url;}
      else{$("err").textContent=d.error||"Couldn't start checkout.";$("go").disabled=false;}
    }catch(e){$("err").textContent=e.message;$("go").disabled=false;}
  }
  async function logout(){await fetch("/api/logout",{method:"POST"});location.href="/login.html";}
  fetch("/api/public-config").then(r=>r.json()).then(c=>{if(c.price)$("priceAmt").innerHTML=c.price+'<span>/month</span>';}).catch(()=>{});
</script>
</body>
</html>
