<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>System Status · Spinlist</title>
<link rel="icon" href="/img/favicon-32.png" sizes="32x32">
<style>
  :root{--ink:#eaf0ff;--ink-2:#b6c2e0;--paper:#0a1228;--paper-2:#121d3d;--surface:#16234a;--neon:#c6f24e;--plum:#5b8cff;--coral:#ff6b5e;--amber:#ffcb47;--muted:#7e8db5;--line:rgba(180,200,255,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:0 22px}
  header.bar{background:rgba(10,18,40,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:1080px;gap:12px}
  .logo-img{height:54px;width:auto;display:block}
  .hero{padding:44px 0 8px}
  .eyebrow{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:700}
  h1{font-size:2rem;margin:8px 0;letter-spacing:-.02em}
  .overall{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin:22px 0}
  .dot{width:16px;height:16px;border-radius:50%;flex:none;box-shadow:0 0 0 4px rgba(255,255,255,.04)}
  .dot.up,.dot.configured,.dot.healthy,.dot.active{background:var(--neon)}
  .dot.degraded,.dot.amber,.dot.off,.dot.missing{background:var(--amber)}
  .dot.down,.dot.problem{background:var(--coral)}
  .overall .big{font-size:1.25rem;font-weight:800}
  .overall .sub{font-size:.86rem;color:var(--muted)}
  .rows{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:20px}
  .row{display:flex;align-items:center;gap:14px;padding:16px 22px;border-top:1px solid var(--line)}
  .row:first-child{border-top:0}
  .row .name{font-weight:600;flex:1}
  .row .name small{display:block;font-weight:400;color:var(--muted);font-size:.8rem}
  .row .state{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .state.up,.state.configured,.state.healthy,.state.active{color:var(--neon)}
  .state.degraded,.state.off,.state.missing{color:var(--amber)}
  .state.down,.state.problem{color:var(--coral)}
  .meta{color:var(--muted);font-size:.84rem;text-align:center;padding:8px 0 40px}
  .meta a{color:var(--plum);text-decoration:none}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--neon);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
  @keyframes s{to{transform:rotate(360deg)}}
  .refresh{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:100px;padding:7px 16px;cursor:pointer;font-size:.84rem;font-weight:600}
  .refresh:hover{border-color:var(--neon)}
</style>
</head>
<body>
<header class="bar"><div class="wrap">
  <a class="logo" href="/"><img src="/img/spinlist-logo-dark.png" alt="Spinlist" class="logo-img"></a>
  <div id="spinlist-nav"></div>
  <div id="spinlist-acct" style="display:none"></div>
</div></header>
<script src="/js/nav.js"></script>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">System Status</div>
    <h1>Is Spinlist running?</h1>
  </div>

  <div class="overall" id="overall">
    <span class="dot" id="overall-dot"></span>
    <div style="flex:1">
      <div class="big" id="overall-text"><span class="spin"></span> Checking…</div>
      <div class="sub" id="overall-sub">Reading live system status</div>
    </div>
    <button class="refresh" onclick="load()">Refresh</button>
  </div>

  <div class="rows" id="rows"></div>

  <div class="meta" id="meta">
    Auto-refreshes every 30 seconds. <a href="/api/health" target="_blank">Raw JSON</a>
  </div>
</div>

<script>
  const LABELS = {
    server:        ['Web server', 'The Spinlist app itself'],
    database:      ['Database', 'Your events, weddings and accounts'],
    spotify:       ['Spotify search', 'Live song search for guests'],
    appleFallback: ['Apple Music fallback', 'Backup search if Spotify is busy'],
    demo:          ['Public demo', 'The shareable /demo event'],
  };
  const STATE_TEXT = {
    up: 'Operational', healthy: 'Operational', configured: 'Ready', active: 'Active',
    degraded: 'Degraded', off: 'Not set up', missing: 'Missing',
    down: 'Down', problem: 'Problem',
  };

  async function load() {
    const rows = document.getElementById('rows');
    try {
      const r = await fetch('/api/health', { cache: 'no-store' });
      const d = await r.json();

      // Overall
      const odot = document.getElementById('overall-dot');
      const otext = document.getElementById('overall-text');
      const osub = document.getElementById('overall-sub');
      odot.className = 'dot ' + (d.ok ? 'healthy' : 'problem');
      otext.textContent = d.ok ? 'All systems operational' : 'Something needs attention';
      const up = d.uptimeSeconds || 0;
      const upStr = up > 86400 ? Math.floor(up/86400)+'d' : up > 3600 ? Math.floor(up/3600)+'h' : Math.floor(up/60)+'m';
      osub.textContent = 'Up ' + upStr + ' · checked ' + new Date(d.time).toLocaleTimeString();

      // Rows
      rows.innerHTML = '';
      for (const key of Object.keys(LABELS)) {
        const c = (d.checks && d.checks[key]) || { status: 'unknown' };
        const [name, desc] = LABELS[key];
        let detail = desc;
        if (key === 'database' && c.users != null) detail = c.events + ' events · ' + c.weddings + ' weddings';
        if (key === 'spotify' && c.note) detail = desc + ' (' + c.note + ')';
        if (key === 'appleFallback' && c.note) detail = c.note.charAt(0).toUpperCase() + c.note.slice(1);
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML =
          '<span class="dot ' + c.status + '"></span>' +
          '<div class="name">' + name + '<small>' + detail + '</small></div>' +
          '<div class="state ' + c.status + '">' + (STATE_TEXT[c.status] || c.status) + '</div>';
        rows.appendChild(div);
      }
    } catch (e) {
      document.getElementById('overall-dot').className = 'dot down';
      document.getElementById('overall-text').textContent = 'Status unavailable';
      document.getElementById('overall-sub').textContent = 'Could not reach the status endpoint';
      rows.innerHTML = '<div class="row"><span class="dot down"></span><div class="name">Web server<small>Not responding</small></div><div class="state down">Down</div></div>';
    }
  }
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
