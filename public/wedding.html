<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinlist — Wedding Planner</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png"><link rel="apple-touch-icon" sizes="180x180" href="/img/favicon-180.png">
<style>
  :root{--ink:#eaf0ff;--ink-2:#b6c2e0;--paper:#0a1228;--paper-2:#121d3d;--surface:#16234a;--neon:#c6f24e;--plum:#5b8cff;--coral:#ff6b5e;--muted:#7e8db5;--line:rgba(180,200,255,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}
  .display{font-weight:900;letter-spacing:-.02em}
  a{color:var(--plum);text-decoration:none}
  header.bar{background:rgba(10,18,40,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:1080px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-img{height:54px;width:auto;display:block}
  .bar nav a{color:var(--ink);font-weight:600;font-size:.9rem;margin-left:16px}
  .btn{font:inherit;font-weight:700;border:0;border-radius:100px;padding:11px 20px;cursor:pointer;font-size:.92rem;display:inline-flex;align-items:center;gap:8px;transition:transform .15s;text-decoration:none}
  .btn:hover{transform:translateY(-2px)}
  .btn-neon{background:var(--neon);color:#0a1228}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn-sm{padding:7px 13px;font-size:.83rem}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:20px}
  h1{font-size:2.1rem;margin-top:34px}
  h2{font-size:1.4rem}
  .eyebrow{font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .lead{color:var(--ink-2);margin-top:10px;line-height:1.6}
  .field{display:block;margin-bottom:14px}
  .field span{display:block;font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .field input{width:100%;font:inherit;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;background:var(--paper-2);color:var(--ink)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .muted{color:var(--muted);font-size:.88rem}
  .pill{display:inline-block;background:rgba(91,140,255,.16);color:var(--plum);font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:100px}
  .pill.done{background:rgba(198,242,78,.16);color:var(--neon)}
  .block{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .block-head h3{font-size:1.08rem}
  .song-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
  .song-row img{width:38px;height:38px;border-radius:6px;object-fit:cover;background:var(--surface)}
  .song-row .meta{flex:1;min-width:0}
  .song-row .t{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .song-row .a{color:var(--muted);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{background:transparent;border:0;color:var(--coral);cursor:pointer;font-size:1.1rem;padding:4px 8px}
  .addbtn{background:transparent;border:1.5px dashed var(--line);color:var(--ink-2);border-radius:10px;padding:9px;width:100%;cursor:pointer;font:inherit;font-size:.88rem;margin-top:8px}
  .wcard{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer}
  .wcard:hover{border-color:var(--plum)}
  .code{font-family:ui-monospace,Menlo,monospace;background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-weight:700;letter-spacing:.1em}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(5,9,22,.74);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:540px;width:100%}
  .result{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer}
  .result:hover{background:var(--paper-2)}
  .result img{width:40px;height:40px;border-radius:6px;object-fit:cover}
  .hide{display:none!important}
  .tabs{display:flex;gap:6px;margin-top:26px;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{background:transparent;border:0;border-bottom:3px solid transparent;color:var(--muted);font:inherit;font-weight:700;font-size:.95rem;padding:12px 16px;cursor:pointer;white-space:nowrap;transition:color .15s}
  .tab:hover{color:var(--ink-2)}
  .tab.active{color:var(--ink);border-bottom-color:var(--neon)}
  .tab-pane{display:none}
  .tab-pane.show{display:block}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:100px;font-weight:600;opacity:0;transition:opacity .2s;z-index:80;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:640px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="bar"><div class="wrap">
  <a class="logo" href="/"><img src="/img/spinlist-logo-dark.png" alt="Spinlist" class="logo-img"></a>
  <nav><a href="/">Home</a><a href="/account.html">Account</a><a href="#" onclick="logout();return false">Log out</a></nav>
</div></header>

<div class="wrap" id="root">
  <p class="muted" style="margin-top:40px">Loading…</p>
</div>

<div class="toast" id="toast"></div>

<!-- SONG SEARCH MODAL -->
<div class="overlay" id="search-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 id="search-title" style="font-size:1.15rem">Add a song</h2>
      <button class="iconbtn" style="color:var(--muted);font-size:1.4rem" onclick="closeSearch()">×</button>
    </div>
    <p class="muted" id="search-sub" style="margin-bottom:12px"></p>
    <input id="search-input" class="field" style="margin-bottom:8px" placeholder="Search Spotify for a song or artist…" oninput="debouncedSearch()" autocomplete="off">
    <div id="search-results"></div>
  </div>
</div>

<script>
let ME=null, CURRENT=null;     // CURRENT = the wedding being edited
let activeBlockId=null;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function api(path,opts){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));
  let d={}; try{d=await r.json();}catch(e){}
  if(!r.ok) throw new Error(d.error||'Something went wrong');
  return d;
}

async function logout(){try{await fetch('/api/auth/logout',{method:'POST'});}catch(e){}location.href='/';}

async function boot(){
  const code=new URLSearchParams(location.search).get('code');   // invite link ?code=ABC123
  try{
    const me=await api('/api/me');
    ME=me.user;
  }catch(e){ME=null;}

  if(!ME){
    // Not logged in: if there's a code, show couple signup; else show a sign-in prompt.
    renderSignup(code);
    return;
  }
  if(ME.role==='couple'){ renderCoupleHome(); return; }
  renderDJHome();
}

/* ---------------- COUPLE SIGNUP (with code) ---------------- */
function renderSignup(code){
  const root=document.getElementById('root');
  root.innerHTML=`
    <p class="eyebrow" style="margin-top:40px">Wedding planner</p>
    <h1 class="display">${code?'Plan your wedding songs':'Sign in'}</h1>
    <p class="lead">${code?'Your DJ has set up a song plan for your big day. Create a free account to fill it in.':'Log in to access your wedding plan.'}</p>
    <div class="panel" style="max-width:460px">
      ${code?`<div class="field"><span>Your wedding code</span><input id="su-code" value="${esc(code)}" ${code?'readonly':''}></div>`:`<div class="field"><span>Wedding code (from your DJ)</span><input id="su-code" placeholder="e.g. ABC123"></div>`}
      <div class="field"><span>Your names</span><input id="su-name" placeholder="Sarah & Tom"></div>
      <div class="field"><span>Email</span><input id="su-email" type="email" placeholder="you@example.com"></div>
      <div class="field"><span>Password (min 8 chars)</span><input id="su-pass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-neon" style="width:100%;justify-content:center" onclick="doSignup()">Create account &amp; start ▸</button>
      <p class="muted" style="margin-top:12px;text-align:center">Already have an account? <a href="#" onclick="doShowLogin();return false">Log in</a></p>
      <div id="su-msg" class="muted" style="margin-top:10px;color:var(--coral)"></div>
    </div>`;
}
function doShowLogin(){
  const root=document.getElementById('root');
  root.innerHTML=`
    <p class="eyebrow" style="margin-top:40px">Wedding planner</p>
    <h1 class="display">Log in</h1>
    <div class="panel" style="max-width:420px">
      <div class="field"><span>Email</span><input id="li-email" type="email"></div>
      <div class="field"><span>Password</span><input id="li-pass" type="password"></div>
      <button class="btn btn-neon" style="width:100%;justify-content:center" onclick="doLogin()">Log in ▸</button>
      <div id="li-msg" class="muted" style="margin-top:10px;color:var(--coral)"></div>
    </div>`;
}
async function doLogin(){
  const email=val('li-email'),password=val('li-pass');
  try{ await api('/api/auth/login',{method:'POST',body:JSON.stringify({email,password})}); location.reload(); }
  catch(e){ document.getElementById('li-msg').textContent=e.message; }
}
async function doSignup(){
  const weddingCode=val('su-code'),name=val('su-name'),email=val('su-email'),password=val('su-pass');
  const msg=document.getElementById('su-msg');msg.textContent='';
  if(!weddingCode){msg.textContent='Please enter your wedding code.';return;}
  if(password.length<8){msg.textContent='Password must be at least 8 characters.';return;}
  try{
    await api('/api/auth/signup',{method:'POST',body:JSON.stringify({email,password,name,weddingCode})});
    location.href='/wedding.html';
  }catch(e){ msg.textContent=e.message; }
}

/* ---------------- COUPLE HOME ---------------- */
async function renderCoupleHome(){
  const root=document.getElementById('root');
  let weddings=[];
  try{ weddings=(await api('/api/my-weddings')).weddings; }catch(e){}
  if(!weddings.length){
    root.innerHTML=`<h1 class="display" style="margin-top:40px">No wedding plan yet</h1>
      <p class="lead">Ask your DJ for your wedding code, then <a href="#" onclick="renderSignup();return false">enter it here</a>.</p>`;
    return;
  }
  if(weddings.length===1){ openWedding(weddings[0].id); return; }
  root.innerHTML=`<h1 class="display" style="margin-top:40px">Your weddings</h1>`+
    weddings.map(w=>`<div class="wcard" onclick="openWedding('${w.id}')"><div><b>${esc(w.name)}</b><div class="muted">${esc(w.coupleNames||'')}</div></div><span class="btn btn-ghost btn-sm">Open ▸</span></div>`).join('');
}

/* ---------------- DJ HOME ---------------- */
async function renderDJHome(){
  const root=document.getElementById('root');
  let weddings=[];
  try{ weddings=(await api('/api/weddings')).weddings; }catch(e){}
  root.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:36px;flex-wrap:wrap;gap:12px">
      <div><p class="eyebrow">Wedding planner</p><h1 class="display" style="margin-top:6px">Your weddings</h1></div>
      <button class="btn btn-neon" onclick="openCreate()">+ New wedding</button>
    </div>
    <p class="lead">Create a song plan, share the code with the couple, and they'll fill in their choices before the big day.</p>
    <div id="dj-list" style="margin-top:8px">
      ${weddings.length?weddings.map(djCard).join(''):'<div class="panel"><p class="muted">No weddings yet. Create your first one.</p></div>'}
    </div>`;
}
function djCard(w){
  const total=w.blockCount||0;
  return `<div class="wcard" onclick="openWedding('${w.id}')">
    <div>
      <b>${esc(w.name)}</b> ${w.coupleJoined?'<span class="pill done">Couple joined</span>':'<span class="pill">Awaiting couple</span>'}
      <div class="muted">${esc(w.coupleNames||'')} · ${w.filledCount} songs across ${total} blocks · code <b>${esc(w.inviteCode)}</b></div>
    </div>
    <span class="btn btn-ghost btn-sm">Open ▸</span>
  </div>`;
}

/* ---------------- CREATE WEDDING (DJ) ---------------- */
const DEFAULT_BLOCKS=[
  {name:'First Dance',capacity:1},{name:'Cake Cutting',capacity:1},
  {name:"Couple's Top 15",capacity:15},{name:'Play If Possible',capacity:30},
  {name:'Last Dance',capacity:1},{name:'Do Not Play',capacity:5}
];
let draftBlocks=[];
function openCreate(){
  draftBlocks=DEFAULT_BLOCKS.map(b=>({name:b.name,capacity:b.capacity}));
  const root=document.getElementById('root');
  root.innerHTML=`
    <h1 class="display" style="margin-top:36px">New wedding plan</h1>
    <div class="panel" style="max-width:640px">
      <div class="grid-2">
        <div class="field"><span>Wedding name</span><input id="w-name" placeholder="Sarah & Tom's Wedding"></div>
        <div class="field"><span>Couple's names</span><input id="w-couple" placeholder="Sarah & Tom"></div>
      </div>
      <h2 style="font-size:1.1rem;margin:10px 0 4px">Song blocks</h2>
      <p class="muted" style="margin-bottom:12px">Customise the blocks and how many songs each can hold. The couple fills these in.</p>
      <div id="blocks-edit"></div>
      <button class="addbtn" onclick="addDraftBlock()">+ Add a block</button>
      <div style="margin-top:18px;display:flex;gap:10px">
        <button class="btn btn-neon" onclick="createWedding()">Create &amp; get code ▸</button>
        <button class="btn btn-ghost" onclick="renderDJHome()">Cancel</button>
      </div>
      <div id="w-msg" class="muted" style="margin-top:10px;color:var(--coral)"></div>
    </div>`;
  renderDraftBlocks();
}
function renderDraftBlocks(){
  const el=document.getElementById('blocks-edit');
  el.innerHTML=draftBlocks.map((b,i)=>`
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input style="flex:1;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)" value="${esc(b.name)}" oninput="draftBlocks[${i}].name=this.value">
      <input type="number" min="1" max="100" style="width:78px;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)" value="${b.capacity}" oninput="draftBlocks[${i}].capacity=+this.value" title="Number of songs">
      <button class="iconbtn" onclick="draftBlocks.splice(${i},1);renderDraftBlocks()">🗑</button>
    </div>`).join('');
}
function addDraftBlock(){draftBlocks.push({name:'New block',capacity:5});renderDraftBlocks();}
async function createWedding(){
  const name=val('w-name'),coupleNames=val('w-couple');
  const msg=document.getElementById('w-msg');msg.textContent='';
  if(!name){msg.textContent='Please give the wedding a name.';return;}
  const blocks=draftBlocks.filter(b=>b.name&&b.name.trim()).map(b=>({name:b.name,capacity:Math.max(1,b.capacity||1)}));
  if(!blocks.length){msg.textContent='Add at least one block.';return;}
  try{
    const d=await api('/api/weddings',{method:'POST',body:JSON.stringify({name,coupleNames,blocks})});
    openWedding(d.wedding.id);
  }catch(e){ msg.textContent=e.message; if(/PRO feature/.test(e.message)){setTimeout(()=>location.href='/pricing.html',1500);} }
}

/* ---------------- OPEN A WEDDING (shared plan editor) ---------------- */
async function openWedding(id){
  try{ CURRENT=(await api('/api/weddings/'+id)).wedding; }
  catch(e){ toast(e.message); return; }
  renderPlan();
}
let currentTab='music';
function renderPlan(){
  const w=CURRENT, isDJ=ME.role!=='couple';
  const root=document.getElementById('root');
  const filled=w.blocks.reduce((s,b)=>s+b.songs.length,0);
  const cap=w.blocks.reduce((s,b)=>s+b.capacity,0);
  root.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:34px;flex-wrap:wrap;gap:12px">
      <div>
        <p class="eyebrow">${isDJ?'Wedding plan':'Your wedding songs'}</p>
        <h1 class="display" style="margin-top:6px">${esc(w.name)}</h1>
        <p class="muted">${esc(w.coupleNames||'')} · ${filled} of ${cap} songs chosen</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${isDJ?`<button class="btn btn-ghost btn-sm" onclick="renderDJHome()">← All weddings</button>`:''}
      </div>
    </div>
    ${isDJ&&w.inviteCode?`<div class="panel" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div><b>Share with the couple</b><div class="muted">They sign up at spinlist.co.uk/wedding.html with this code (or the link).</div></div>
      <div style="display:flex;gap:8px;align-items:center"><span class="code">${esc(w.inviteCode)}</span><button class="btn btn-ghost btn-sm" onclick="copyInvite('${esc(w.inviteCode)}')">Copy link</button></div>
    </div>`:''}

    <div class="tabs">
      <button class="tab" data-tab="music" onclick="switchTab('music')">🎵 Music</button>
      <button class="tab" data-tab="timeline" onclick="switchTab('timeline')">🕐 Timeline</button>
      <button class="tab" data-tab="questionnaire" onclick="switchTab('questionnaire')">📋 Questionnaire</button>
    </div>

    <section class="tab-pane" id="pane-music">
      ${!isDJ?`<p class="lead" style="margin-top:18px">Search and add your songs to each section below. Your choices save automatically — you can come back any time.</p>`:''}
      <div id="blocks" style="margin-top:14px"></div>
    </section>

    <section class="tab-pane" id="pane-timeline">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:22px">
        <h2>Timeline of the day</h2>
        <button class="btn btn-ghost btn-sm" onclick="addTimelineRow()">+ Add moment</button>
      </div>
      <p class="muted" style="margin:4px 0 12px">The running order for the day — both you and your DJ can edit this.</p>
      <div class="panel" id="timeline-panel" style="margin-top:0"></div>
    </section>

    <section class="tab-pane" id="pane-questionnaire">
      <div style="margin-top:22px"><h2>Questionnaire</h2></div>
      <div class="panel"><p class="muted">Coming soon — your DJ will add questions here for you to answer.</p></div>
    </section>`;
  renderBlocks();
  renderTimeline();
  switchTab(currentTab);
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('show',p.id==='pane-'+tab));
}
function renderBlocks(){
  const w=CURRENT;
  document.getElementById('blocks').innerHTML=w.blocks.map(b=>{
    const full=b.songs.length>=b.capacity;
    return `<div class="block">
      <div class="block-head">
        <h3>${esc(b.name)}</h3>
        <span class="pill ${full?'done':''}">${b.songs.length}/${b.capacity}</span>
      </div>
      <div>${b.songs.map((s,i)=>songRow(b.id,s,i)).join('')||'<p class="muted" style="padding:6px 0">No songs yet.</p>'}</div>
      ${full?'':`<button class="addbtn" onclick="openSearch('${b.id}')">+ Add a song</button>`}
    </div>`;
  }).join('');
}
function songRow(blockId,s,i){
  return `<div class="song-row">
    <img src="${esc(s.art||'')}" alt="" onerror="this.style.visibility='hidden'">
    <div class="meta"><div class="t">${esc(s.title)}</div><div class="a">${esc(s.artist)}</div></div>
    <button class="iconbtn" title="Remove" onclick="removeSong('${blockId}',${i})">×</button>
  </div>`;
}
function copyInvite(code){
  const link=location.origin+'/wedding.html?code='+encodeURIComponent(code);
  navigator.clipboard?.writeText(link).then(()=>toast('Invite link copied'),()=>toast('Link: '+link));
}

/* ---------------- TIMELINE (DJ + couple both edit) ---------------- */
function renderTimeline(){
  const w=CURRENT;
  const tl=w.timeline||[];
  const el=document.getElementById('timeline-panel');
  if(!el)return;
  if(!tl.length){
    el.innerHTML='<p class="muted">No timeline yet. Add the first moment of the day above.</p>';
    return;
  }
  el.innerHTML=tl.map((t,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input value="${esc(t.time)}" placeholder="7:30pm" oninput="CURRENT.timeline[${i}].time=this.value;queueTimelineSave()"
        style="width:110px;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)">
      <input value="${esc(t.label)}" placeholder="e.g. First dance" oninput="CURRENT.timeline[${i}].label=this.value;queueTimelineSave()"
        style="flex:1;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)">
      <button class="iconbtn" title="Remove" onclick="removeTimelineRow(${i})">🗑</button>
    </div>`).join('');
}
function addTimelineRow(){
  if(!CURRENT.timeline)CURRENT.timeline=[];
  CURRENT.timeline.push({id:'tl'+Date.now(),time:'',label:''});
  renderTimeline();
  queueTimelineSave();
}
function removeTimelineRow(i){
  CURRENT.timeline.splice(i,1);
  renderTimeline();
  saveTimeline();
}
let tlSaveT;
function queueTimelineSave(){clearTimeout(tlSaveT);tlSaveT=setTimeout(saveTimeline,700);}
async function saveTimeline(){
  try{
    const d=await api('/api/weddings/'+CURRENT.id+'/timeline',{method:'POST',body:JSON.stringify({timeline:CURRENT.timeline})});
    CURRENT=d.wedding;
    toast('Timeline saved');
  }catch(e){ toast(e.message); }
}


/* ---------------- SONG SEARCH + SAVE ---------------- */
function openSearch(blockId){
  activeBlockId=blockId;
  const b=CURRENT.blocks.find(x=>x.id===blockId);
  document.getElementById('search-title').textContent='Add to “'+b.name+'”';
  document.getElementById('search-sub').textContent=b.songs.length+' of '+b.capacity+' added';
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
  document.getElementById('search-modal').classList.add('show');
  setTimeout(()=>document.getElementById('search-input').focus(),50);
}
function closeSearch(){document.getElementById('search-modal').classList.remove('show');}
let searchT;
function debouncedSearch(){clearTimeout(searchT);searchT=setTimeout(runSearch,300);}
async function runSearch(){
  const q=val('search-input');const box=document.getElementById('search-results');
  if(!q){box.innerHTML='';return;}
  try{
    const d=await api('/api/search?q='+encodeURIComponent(q)+'&limit=8');
    box.innerHTML=(d.tracks||[]).map(t=>`
      <div class="result" onclick='addSong(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
        <img src="${esc(t.art||'')}" onerror="this.style.visibility='hidden'">
        <div class="meta" style="flex:1;min-width:0"><div class="t" style="font-weight:600">${esc(t.title)}</div><div class="a muted">${esc(t.artist)}</div></div>
        <span class="btn btn-neon btn-sm">Add</span>
      </div>`).join('')||'<p class="muted" style="padding:8px">No results.</p>';
  }catch(e){ box.innerHTML='<p class="muted" style="padding:8px">Search failed — try again.</p>'; }
}
async function addSong(t){
  const b=CURRENT.blocks.find(x=>x.id===activeBlockId);
  if(b.songs.length>=b.capacity){toast('That block is full');return;}
  if(b.songs.some(s=>s.id===t.id)){toast('Already added');return;}
  b.songs.push({id:t.id,uri:t.uri,title:t.title,artist:t.artist,art:t.art});
  await saveBlock(b);
  document.getElementById('search-sub').textContent=b.songs.length+' of '+b.capacity+' added';
  if(b.songs.length>=b.capacity)closeSearch();
}
async function removeSong(blockId,i){
  const b=CURRENT.blocks.find(x=>x.id===blockId);
  b.songs.splice(i,1);
  await saveBlock(b);
}
async function saveBlock(b){
  try{
    const d=await api('/api/weddings/'+CURRENT.id+'/block/'+b.id,{method:'POST',body:JSON.stringify({songs:b.songs})});
    CURRENT=d.wedding;
    renderBlocks();
    toast('Saved');
  }catch(e){ toast(e.message); }
}

function val(id){return (document.getElementById(id)||{}).value||'';}
window.addEventListener('load',boot);
</script>
