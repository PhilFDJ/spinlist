<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinlist — Wedding Planner</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png"><link rel="apple-touch-icon" sizes="180x180" href="/img/favicon-180.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--ink:#eaf0ff;--ink-2:#b6c2e0;--paper:#0a1228;--paper-2:#121d3d;--surface:#16234a;--neon:#c6f24e;--plum:#5b8cff;--coral:#ff6b5e;--muted:#7e8db5;--line:rgba(180,200,255,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}
  .display{font-weight:900;letter-spacing:-.02em}
  a{color:var(--plum);text-decoration:none}
  header.bar{background:rgba(10,18,40,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:1080px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-img{height:54px;width:auto;display:block}
  .bar nav a{color:var(--ink);font-weight:600;font-size:.9rem;margin-left:16px}
  .btn{font:inherit;font-weight:700;border:0;border-radius:100px;padding:11px 20px;cursor:pointer;font-size:.92rem;display:inline-flex;align-items:center;gap:8px;transition:transform .15s;text-decoration:none}
  .btn:hover{transform:translateY(-2px)}
  .btn-neon{background:var(--neon);color:#0a1228}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn-sm{padding:7px 13px;font-size:.83rem}
  .seg-btn{border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:.78rem;padding:7px 14px;border-radius:100px;cursor:pointer;transition:.15s}
  .seg-btn.on{background:var(--ink);color:var(--paper)}
  .mini-btn{font:inherit;font-size:.76rem;font-weight:700;padding:5px 10px;border-radius:100px;border:1.5px solid var(--line);background:transparent;color:var(--ink-2);cursor:pointer;white-space:nowrap}
  .mini-btn:hover{border-color:var(--plum);color:var(--ink)}
  .mini-btn.done{background:var(--neon);color:#0a1228;border-color:var(--neon)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:20px}
  h1{font-size:2.1rem;margin-top:34px}
  h2{font-size:1.4rem}
  .eyebrow{font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .lead{color:var(--ink-2);margin-top:10px;line-height:1.6}
  .field{display:block;margin-bottom:14px}
  .field span{display:block;font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .field input{width:100%;font:inherit;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;background:var(--paper-2);color:var(--ink)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .muted{color:var(--muted);font-size:.88rem}
  .pill{display:inline-block;background:rgba(91,140,255,.16);color:var(--plum);font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:100px}
  .pill.done{background:rgba(198,242,78,.16);color:var(--neon)}
  .block{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .block-head h3{font-size:1.08rem}
  .song-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line);flex-wrap:wrap}
  .song-row img{width:38px;height:38px;border-radius:6px;object-fit:cover;background:var(--surface)}
  .song-row .meta{flex:1;min-width:0}
  .song-row .t{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .song-row .a{color:var(--muted);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{background:transparent;border:0;color:var(--coral);cursor:pointer;font-size:1.1rem;padding:4px 8px}
  .addbtn{background:transparent;border:1.5px dashed var(--line);color:var(--ink-2);border-radius:10px;padding:9px;width:100%;cursor:pointer;font:inherit;font-size:.88rem;margin-top:8px}
  .wcard{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer}
  .wcard:hover{border-color:var(--plum)}
  .code{font-family:ui-monospace,Menlo,monospace;background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-weight:700;letter-spacing:.1em}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(5,9,22,.74);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:540px;width:100%}
  .result{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer}
  .result:hover{background:var(--paper-2)}
  .result img{width:40px;height:40px;border-radius:6px;object-fit:cover}
  .hide{display:none!important}
  .tabs{display:flex;gap:6px;margin-top:26px;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{background:transparent;border:0;border-bottom:3px solid transparent;color:var(--muted);font:inherit;font-weight:700;font-size:.95rem;padding:12px 16px;cursor:pointer;white-space:nowrap;transition:color .15s}
  .tab:hover{color:var(--ink-2)}
  .tab.active{color:var(--ink);border-bottom-color:var(--neon)}
  .tab-pane{display:none}
  .tab-pane.show{display:block}
  .drag-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  .drag-handle{cursor:grab;color:var(--muted);font-size:1.1rem;user-select:none;padding:0 2px}
  .drag-handle:active{cursor:grabbing}
  .block.drag-row{display:block}
  .block[draggable="true"]{cursor:default}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:100px;font-weight:600;opacity:0;transition:opacity .2s;z-index:80;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:640px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="bar"><div class="wrap">
  <a class="logo" href="/"><img src="/img/spinlist-logo-dark.png" alt="Spinlist" class="logo-img"></a>
  <nav id="wed-nav"><span id="notif-bell" style="display:none;position:relative;cursor:pointer;margin-right:6px" onclick="toggleNotifPanel(event)">🔔<span id="notif-count" style="display:none;position:absolute;top:-6px;right:-8px;background:var(--plum);color:#fff;font-size:.62rem;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px"></span></span><a href="/">Home</a><a href="/account.html">Account</a><a href="#" onclick="logout();return false">Log out</a></nav>
  <div id="notif-panel" style="display:none;position:fixed;top:60px;right:20px;width:340px;max-width:calc(100vw - 40px);max-height:70vh;overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:300;padding:8px"></div>
  <div id="gig-window" style="display:none;position:fixed;top:90px;right:20px;width:360px;max-width:calc(100vw - 40px);max-height:75vh;background:#0b1020;border:2px solid var(--neon);border-radius:16px;box-shadow:0 16px 50px rgba(0,0,0,.6);z-index:290;overflow:hidden;display:none;flex-direction:column"></div>
</div></header>

<div class="wrap" id="root">
  <p class="muted" style="margin-top:40px">Loading…</p>
</div>

<div class="toast" id="toast"></div>

<!-- SONG SEARCH MODAL -->
<div class="overlay" id="search-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 id="search-title" style="font-size:1.15rem">Add a song</h2>
      <button class="iconbtn" style="color:var(--muted);font-size:1.4rem" onclick="closeSearch()">×</button>
    </div>
    <p class="muted" id="search-sub" style="margin-bottom:12px"></p>
    <input id="search-input" class="field" style="margin-bottom:8px" placeholder="Search Spotify for a song or artist…" oninput="debouncedSearch()" autocomplete="off">
    <div id="search-results"></div>
  </div>
</div>

<script>
let ME=null, CURRENT=null;     // CURRENT = the wedding being edited
let activeBlockId=null;
let PREVIEW_COUPLE=false;       // DJ previewing the couple's view

// True when the current viewer should see the DJ view (false = couple view).
// The account holder can preview the couple view via PREVIEW_COUPLE.
function isDjView(){ return ME && ME.role!=='couple' && !PREVIEW_COUPLE; }
function toggleCouplePreview(){ PREVIEW_COUPLE=!PREVIEW_COUPLE; renderPlan(); window.scrollTo(0,0); }

/* ---------- Notification centre (DJ only) ---------- */
let NOTIFS=[], NOTIF_SEEN=null;
async function loadNotifs(firstLoad){
  if(!ME||ME.role==='couple')return;
  let d;
  try{ d=await (await fetch('/api/notifications')).json(); }catch(e){ return; }
  NOTIFS=d.notifications||[];
  const bell=document.getElementById('notif-bell'),cnt=document.getElementById('notif-count');
  if(bell)bell.style.display='inline-block';
  if(cnt){ if(d.unread>0){cnt.style.display='flex';cnt.textContent=d.unread>9?'9+':d.unread;} else cnt.style.display='none'; }
  // Toast newly-arrived unread items (not on the very first paint of the session).
  if(!firstLoad){
    NOTIFS.filter(n=>!n.read && (!NOTIF_SEEN||n.createdAt>NOTIF_SEEN)).slice(0,3).forEach(n=>toast('🔔 '+n.text));
  }else{
    // On first load, toast a summary if there's unread activity.
    if(d.unread>0)toast('🔔 '+d.unread+' new update'+(d.unread>1?'s':'')+' from couples');
  }
  if(NOTIFS.length)NOTIF_SEEN=Math.max(...NOTIFS.map(n=>n.createdAt));
}
function toggleNotifPanel(e){
  if(e)e.stopPropagation();
  const p=document.getElementById('notif-panel');if(!p)return;
  if(p.style.display==='block'){p.style.display='none';return;}
  renderNotifPanel();p.style.display='block';
  // Mark read after opening.
  fetch('/api/notifications/read',{method:'POST'}).then(()=>{const c=document.getElementById('notif-count');if(c)c.style.display='none';NOTIFS.forEach(n=>n.read=true);});
}
function renderNotifPanel(){
  const p=document.getElementById('notif-panel');if(!p)return;
  if(!NOTIFS.length){p.innerHTML='<p class="muted" style="padding:16px;text-align:center;font-size:.88rem">No activity yet.</p>';return;}
  const ago=ts=>{const s=(Date.now()-ts)/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
  const icon=t=>t==='songs'?'🎵':t==='timeline'?'🕐':t==='answers'?'📋':'🔔';
  p.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px 10px"><b style="font-size:.95rem">Notifications</b><button class="btn btn-ghost btn-sm" onclick="toggleNotifPanel(event)">Close</button></div>'+
    NOTIFS.map(n=>`<div onclick="openWeddingFromNotif('${n.weddingId||''}')" style="display:flex;gap:10px;padding:10px;border-radius:10px;cursor:pointer;${n.read?'':'background:rgba(123,108,255,.1)'}" onmouseover="this.style.background='var(--paper-2)'" onmouseout="this.style.background='${n.read?'transparent':'rgba(123,108,255,.1)'}'">
      <span style="font-size:1.1rem">${icon(n.type)}</span>
      <div style="flex:1;min-width:0"><div style="font-size:.86rem">${esc(n.text)}</div><div class="muted" style="font-size:.72rem;margin-top:2px">${ago(n.createdAt)}</div></div>
    </div>`).join('');
}
async function openWeddingFromNotif(wid){
  document.getElementById('notif-panel').style.display='none';
  if(!wid)return;
  try{ const d=await api('/api/weddings/'+wid); CURRENT=d.wedding; renderPlan(); window.scrollTo(0,0); }catch(e){}
}
document.addEventListener('click',e=>{const p=document.getElementById('notif-panel');const b=document.getElementById('notif-bell');if(p&&p.style.display==='block'&&!p.contains(e.target)&&b&&!b.contains(e.target))p.style.display='none';});

/* ---------- Gig window (floating, DJ + sub-DJ) ---------- */
function openGigWindow(){
  const gw=document.getElementById('gig-window');if(!gw)return;
  renderGigWindow();
  gw.style.display='flex';
}
function renderGigWindow(){
  const gw=document.getElementById('gig-window');if(!gw||!CURRENT)return;
  const q=CURRENT.questionnaire;
  const answers=CURRENT.answers||{};
  const flagged=(q&&q.questions||[]).filter(qq=>qq.gigShow&&qq.type!=='header');
  const rows=flagged.length?flagged.map(qq=>{
    const a=answers[qq.id]||'';
    return `<div style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08)">
      <div style="font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--neon);font-weight:700">${esc(qq.label)}</div>
      <input value="${esc(a)}" placeholder="tap to add…" onchange="saveGigAnswer('${qq.id}',this.value)"
        style="width:100%;font-size:1rem;color:#fff;margin-top:3px;background:transparent;border:none;border-bottom:1px dashed transparent;padding:2px 0;font-family:inherit"
        onfocus="this.style.borderBottomColor='var(--neon)'" onblur="this.style.borderBottomColor='transparent'">
    </div>`;
  }).join(''):'<div style="padding:20px 14px;color:#8b93a7;font-size:.88rem;text-align:center">No questions are flagged for the gig window yet. Tick “📺 Gig window” on questions in your template, then save the template.</div>';
  gw.innerHTML=`
    <div id="gig-head" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--neon);color:#0a1228;cursor:move;user-select:none">
      <b style="font-size:.95rem">📺 ${esc(CURRENT.coupleNames||CURRENT.name||'Gig')}</b>
      <div style="display:flex;gap:8px">
        <span onclick="floatGigOnTop()" title="Float on top (Chrome/Edge)" style="cursor:pointer;font-weight:800">📌</span>
        <span onclick="popOutGig()" title="Pop out to its own window" style="cursor:pointer;font-weight:800">⤢</span>
        <span onclick="refreshGig()" title="Refresh" style="cursor:pointer;font-weight:800">⟳</span>
        <span onclick="document.getElementById('gig-window').style.display='none'" title="Close" style="cursor:pointer;font-weight:800">✕</span>
      </div>
    </div>
    <div style="overflow:auto">${rows}</div>`;
  makeGigDraggable();
}
async function refreshGig(){
  try{ const d=await api('/api/weddings/'+CURRENT.id); CURRENT=d.wedding; renderGigWindow(); }catch(e){}
}
// Fill in / edit a gig-window answer live at the gig (DJ can complete blanks).
async function saveGigAnswer(qid,val){
  CURRENT.answers=CURRENT.answers||{};
  CURRENT.answers[qid]=val;
  try{
    const d=await api('/api/weddings/'+CURRENT.id+'/answers',{method:'POST',body:JSON.stringify({answers:CURRENT.answers})});
    CURRENT=d.wedding;
    toast('Saved ✓');
  }catch(e){ toast('Could not save: '+e.message); }
}
// Open the gig window as its own standalone browser window (drag to a 2nd screen).
function popOutGig(){
  if(!CURRENT)return;
  const w=window.open('/gig.html?w='+encodeURIComponent(CURRENT.id),'gig_'+CURRENT.id,'width=420,height=640');
  // Hand the child the exact data we already have, so it shows immediately and
  // always matches the in-page window — even if the stored snapshot differs.
  if(w){
    try{ w.__SEED_WEDDING=JSON.parse(JSON.stringify(CURRENT)); }catch(e){}
  }
  // Close the in-page floating panel since it's now popped out.
  const gw=document.getElementById('gig-window');if(gw)gw.style.display='none';
  if(w)w.focus();
}
// Float the gig window always-on-top using Document Picture-in-Picture (Chrome/Edge).
// Falls back to the standalone pop-out window on browsers without support (e.g. Safari).
let gigPipWin=null,gigPipTimer=null;
async function floatGigOnTop(){
  if(!('documentPictureInPicture' in window)){
    toast('Always-on-top needs Chrome/Edge — opening a pop-out you can pin instead');
    popOutGig();
    return;
  }
  try{
    gigPipWin=await documentPictureInPicture.requestWindow({width:380,height:520});
  }catch(e){ toast('Could not open floating window — opening pop-out instead'); popOutGig(); return; }
  const gw=document.getElementById('gig-window');if(gw)gw.style.display='none';
  const paint=()=>{
    const q=CURRENT.questionnaire, answers=CURRENT.answers||{};
    const flagged=(q&&q.questions||[]).filter(qq=>qq.gigShow&&qq.type!=='header');
    const rows=flagged.length?flagged.map(qq=>{const a=answers[qq.id];
      return '<div class="row"><div class="q">'+esc(qq.label)+'</div><div class="a'+(a?'':' empty')+'">'+(a?esc(a):'No answer yet')+'</div></div>';
    }).join(''):'<div class="status">No questions flagged for the gig window. Tick “📺 Gig window” on your template and save.</div>';
    gigPipWin.document.body.innerHTML='<header>📺 '+esc(CURRENT.coupleNames||CURRENT.name||'Gig')+'</header><main>'+rows+'</main>';
  };
  gigPipWin.document.head.innerHTML='<style>'
    +'*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#070b16;color:#e8ecf5}'
    +'header{position:sticky;top:0;background:#c1ff2f;color:#0a1228;font-weight:800;padding:12px 16px;font-size:1rem}'
    +'main{padding:4px 0}.row{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08)}'
    +'.row .q{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:#c1ff2f;font-weight:800}'
    +'.row .a{font-size:1.25rem;color:#fff;margin-top:4px;word-wrap:break-word}.row .a.empty{color:#5b6479;font-style:italic;font-size:1rem}'
    +'.status{padding:30px 18px;text-align:center;color:#8b93a7;font-size:.9rem}</style>';
  paint();
  clearInterval(gigPipTimer);
  gigPipTimer=setInterval(async()=>{
    if(!gigPipWin||gigPipWin.closed){clearInterval(gigPipTimer);gigPipWin=null;return;}
    try{ const d=await api('/api/weddings/'+CURRENT.id); CURRENT=d.wedding; paint(); }catch(e){}
  },20000);
  gigPipWin.addEventListener('pagehide',()=>{clearInterval(gigPipTimer);gigPipWin=null;});
}
function makeGigDraggable(){
  const gw=document.getElementById('gig-window');const head=document.getElementById('gig-head');if(!gw||!head)return;
  let dx=0,dy=0,drag=false;
  const down=e=>{drag=true;const p=e.touches?e.touches[0]:e;const r=gw.getBoundingClientRect();dx=p.clientX-r.left;dy=p.clientY-r.top;gw.style.right='auto';e.preventDefault();};
  const move=e=>{if(!drag)return;const p=e.touches?e.touches[0]:e;gw.style.left=Math.max(0,Math.min(window.innerWidth-60,p.clientX-dx))+'px';gw.style.top=Math.max(0,Math.min(window.innerHeight-40,p.clientY-dy))+'px';};
  const up=()=>{drag=false;};
  head.onmousedown=down;document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  head.ontouchstart=down;document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
// Themed replacement for prompt() — asks for an email, returns a Promise<string|null>.
function askEmail(title,placeholder){
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(5,9,20,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px';
    ov.innerHTML=`<div style="background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:400px;width:100%">
      <div style="font-weight:800;font-size:1.05rem;margin-bottom:14px">${title}</div>
      <input id="__ae-input" type="email" placeholder="${placeholder||'you@example.com'}" style="width:100%;font:inherit;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink);margin-bottom:16px">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" id="__ae-cancel">Cancel</button>
        <button class="btn btn-neon btn-sm" id="__ae-ok">Send</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    const input=ov.querySelector('#__ae-input');input.focus();
    const done=v=>{document.body.removeChild(ov);resolve(v);};
    ov.querySelector('#__ae-cancel').onclick=()=>done(null);
    ov.querySelector('#__ae-ok').onclick=()=>done(input.value.trim()||null);
    input.onkeydown=e=>{if(e.key==='Enter')done(input.value.trim()||null);if(e.key==='Escape')done(null);};
    ov.onclick=e=>{if(e.target===ov)done(null);};
  });
}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function api(path,opts){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));
  let d={}; try{d=await r.json();}catch(e){}

/* ---------------- DRAG-AND-DROP REORDER (blocks) ---------------- */
let dragIndex=null, dragCtx=null;
function dragStart(e,i,ctx){dragIndex=i;dragCtx=ctx;e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',String(i));}catch(_){}}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';const row=e.currentTarget;row.style.borderTop='2px solid var(--neon)';}
function dragEnd(e){document.querySelectorAll('.drag-row').forEach(r=>{r.style.borderTop='';r.removeAttribute('draggable');});}
function dropRow(e,toIndex,ctx){
  e.preventDefault();
  document.querySelectorAll('.drag-row').forEach(r=>r.style.borderTop='');
  if(dragIndex===null||dragCtx!==ctx||dragIndex===toIndex)return;
  if(ctx==='edit'){ moveItem(editBlocks,dragIndex,toIndex); renderEditBlocks(); }
  else if(ctx==='music'){ moveItem(CURRENT.blocks,dragIndex,toIndex); renderBlocks(); saveBlockOrder(); }
  else if(ctx==='draft'){ moveItem(draftBlocks,dragIndex,toIndex); renderDraftBlocks(); }
  else if(ctx==='btpl'){ moveItem(editingBTpl.blocks,dragIndex,toIndex); renderBTplBlocks(); }
  else if(ctx==='tplq'){ moveItem(editingTpl.questions,dragIndex,toIndex); renderTplQuestions(); }
  dragIndex=null;dragCtx=null;
}
function moveItem(arr,from,to){const [it]=arr.splice(from,1);arr.splice(to,0,it);}

// Only make a row draggable while its handle is held — keeps inner inputs usable.
function enableRowDrag(handle){const row=handle.closest('.drag-row');if(row)row.setAttribute('draggable','true');}
function disableRowDrag(handle){const row=handle.closest('.drag-row');if(row)row.removeAttribute('draggable');}

// Touch fallback: native HTML5 drag doesn't fire on touchscreens, so we
// implement a simple long-press-free drag using the handle on touch devices.
let touchCtx=null,touchFrom=null;
function initTouchDrag(){
  document.addEventListener('touchmove',e=>{
    if(touchFrom===null)return;
    e.preventDefault();
    const t=e.touches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const row=el&&el.closest('.drag-row[data-i]');
    document.querySelectorAll('.drag-row').forEach(r=>r.style.borderTop='');
    if(row)row.style.borderTop='2px solid var(--neon)';
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(touchFrom===null)return;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const row=el&&el.closest('.drag-row[data-i]');
    document.querySelectorAll('.drag-row').forEach(r=>r.style.borderTop='');
    if(row){
      const to=parseInt(row.dataset.i,10);
      if(!isNaN(to)&&to!==touchFrom){
        if(touchCtx==='edit'){moveItem(editBlocks,touchFrom,to);renderEditBlocks();}
        else if(touchCtx==='music'){moveItem(CURRENT.blocks,touchFrom,to);renderBlocks();saveBlockOrder();}
        else if(touchCtx==='draft'){moveItem(draftBlocks,touchFrom,to);renderDraftBlocks();}
        else if(touchCtx==='btpl'){moveItem(editingBTpl.blocks,touchFrom,to);renderBTplBlocks();}
        else if(touchCtx==='tplq'){moveItem(editingTpl.questions,touchFrom,to);renderTplQuestions();}
      }
    }
    touchFrom=null;touchCtx=null;
  });
}
function handleTouchStart(e,i,ctx){touchFrom=i;touchCtx=ctx;}

async function saveEditWedding(){
  const name=val('ew-name'),coupleNames=val('ew-couple');
  const msg=document.getElementById('ew-msg');msg.textContent='';
  if(!name.trim()){msg.textContent='Please give the wedding a name.';return;}
  const blocks=editBlocks.filter(b=>b.name&&b.name.trim()).map(b=>({id:b.id,name:b.name,capacity:Math.max(1,b.capacity||1)}));
  if(!blocks.length){msg.textContent='Add at least one block.';return;}
  const body={name,coupleNames,blocks};
  const dateStr=val('ew-date');
  body.weddingDate=dateStr?new Date(dateStr).getTime():null;
  const tpl=val('ew-template');
  if(tpl!=='__keep')body.templateId=tpl;   // '' removes, an id switches; '__keep' omits
  try{

    CURRENT=d.wedding;
    toast('Wedding updated');
    renderPlan();
  }catch(e){ msg.textContent=e.message; }
}

// Generate + download a branded QR (lime frame + S-mark) for the live requests link.
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function downloadLiveQR(){
  const w=CURRENT;
  if(!w.liveEventCode){toast('Open guest requests first');return;}
  if(typeof QRCode==='undefined'){toast('QR tool could not load — try refreshing');return;}
  const link=location.origin+'/#vote/'+w.liveEventCode;
  // Render a raw QR off-screen, then draw the branded frame around it.
  const tmp=document.createElement('div');tmp.style.position='fixed';tmp.style.left='-9999px';
  document.body.appendChild(tmp);
  new QRCode(tmp,{text:link,width:240,height:240,colorDark:'#0d0b14',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  const grab=()=>{
    const src=tmp.querySelector('img')||tmp.querySelector('canvas');
    if(!src){document.body.removeChild(tmp);toast('QR not ready, try again');return;}
    const draw=(qrImg)=>{
      const qrSize=240,pad=22,border=10,headH=52;
      const cw=qrSize+pad*2+border*2, ch=qrSize+pad*2+border*2+headH;
      const c=document.createElement('canvas');c.width=cw;c.height=ch;
      const ctx=c.getContext('2d');
      ctx.fillStyle='#c6f24e';roundRect(ctx,0,0,cw,ch,28);ctx.fill();
      ctx.fillStyle='#0d0b14';ctx.font='800 30px "Helvetica Neue",Arial,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('Requests',cw/2,border+headH/2+2);
      const innerTop=border+headH;
      ctx.fillStyle='#ffffff';roundRect(ctx,border,innerTop,cw-border*2,ch-innerTop-border,20);ctx.fill();
      ctx.drawImage(qrImg,border+pad,innerTop+pad,qrSize,qrSize);
      const finish=()=>{
        const a=document.createElement('a');
        a.href=c.toDataURL('image/png');
        a.download=(w.name||'wedding').replace(/\W+/g,'-')+'-requests-QR.png';
        a.click();
        document.body.removeChild(tmp);
        toast('QR saved ⬇');
      };
      const logo=new Image();
      logo.onload=()=>{
        const lsize=qrSize*0.17, cx=cw/2, cy=innerTop+pad+qrSize/2, padBox=lsize*1.7;
        ctx.fillStyle='#ffffff';roundRect(ctx,cx-padBox/2,cy-padBox/2,padBox,padBox,16);ctx.fill();
        ctx.drawImage(logo,cx-lsize/2,cy-lsize/2,lsize,lsize);finish();
      };
      logo.onerror=finish;
      logo.src='/img/spinlist-mark.png?v=4';
    };
    if(src.tagName==='IMG'){ if(src.complete)draw(src); else src.onload=()=>draw(src); }
    else draw(src);
  };
  setTimeout(grab,250);   // give QRCode a moment to render
}

/* ---------------- CSV EXPORT (DJ) ---------------- */
function csvCell(s){
  s=(s==null?'':String(s));
  // Quote if it contains comma, quote, or newline; escape quotes by doubling.
  if(/[",\n]/.test(s))return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function downloadCSV(filename,rows){
  const csv=rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function loadImageData(url){

    return await new Promise((resolve,reject)=>{const fr=new FileReader();fr.onload=()=>resolve(fr.result);fr.onerror=reject;fr.readAsDataURL(blob);});

}
async function exportWeddingPDF(){
  if(!window.jspdf||!window.jspdf.jsPDF){toast('PDF tool could not load — try refreshing');return;}
  const {jsPDF}=window.jspdf;const doc=new jsPDF();const w=CURRENT;
  const PW=210, M=14;            // page width, margin
  let y=0;
  const NEON=[150,180,40], INK=[13,18,30], MUT=[110,120,140];
  function clip(s,n){s=(s||'').toString();return s.length>n?s.slice(0,n-1)+'…':s;}
  function need(h){ if(y+h>284){doc.addPage();y=18;} }

  // Header band — use the agency's accent colour (fall back to dark navy).
  const hexToRgb=h=>{const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec((h||'').trim());return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:null;};
  const readableOn=rgb=>((rgb[0]*299+rgb[1]*587+rgb[2]*114)/1000>150?[13,11,20]:[255,255,255]);
  const accent=(w.branding&&w.branding.color&&hexToRgb(w.branding.color))||[13,18,40];
  const headText=readableOn(accent);
  doc.setFillColor(accent[0],accent[1],accent[2]);doc.rect(0,0,PW,34,'F');
  doc.setTextColor(headText[0],headText[1],headText[2]);doc.setFont('helvetica','bold');doc.setFontSize(20);
  doc.text(clip(w.name||'Wedding',40),M,16);
  doc.setFont('helvetica','normal');doc.setFontSize(11);
  let sub=[];if(w.coupleNames)sub.push(w.coupleNames);if(w.weddingDate)sub.push(fmtWeddingDate(w.weddingDate));
  doc.text(sub.join('   ·   '),M,25);
  // Optional host logo, right-aligned in the band.
  if(w.branding&&w.branding.logo){
    try{
      const logoData=await loadImageData(w.branding.logo);
      if(logoData){const fmt=/\.png|image\/png/i.test(w.branding.logo)?'PNG':(/\.svg|svg\+xml/i.test(w.branding.logo)?'PNG':'JPEG');
        doc.addImage(logoData,fmt,PW-M-28,3,28,28);}
    }catch(e){/* skip unsupported */}
  }
  y=44;

  function sectionTitle(t){
    need(16);
    doc.setTextColor(NEON[0],NEON[1],NEON[2]);doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text(t.toUpperCase(),M,y);
    doc.setDrawColor(220);doc.line(M,y+2,PW-M,y+2);
    y+=10;doc.setTextColor(INK[0],INK[1],INK[2]);
  }

  // ---- Song blocks ----
  sectionTitle('Song blocks');
  (w.blocks||[]).forEach(b=>{
    need(12);
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text(clip(b.name,50),M,y);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(MUT[0],MUT[1],MUT[2]);
    doc.text(`${(b.songs||[]).length}/${b.capacity}`,PW-M,y,{align:'right'});
    y+=6;
    if(!(b.songs||[]).length){
      doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(MUT[0],MUT[1],MUT[2]);
      doc.text('—',M+4,y);y+=6;
    }else{
      b.songs.forEach((s,i)=>{
        need(7);
        doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(INK[0],INK[1],INK[2]);
        const played=s.played?'  ✓ played':'';
        doc.text(`${i+1}.  ${clip(s.title,46)} — ${clip(s.artist,34)}${played}`,M+4,y);
        y+=6;
      });
    }
    y+=4;
  });

  // ---- Timeline ----
  if((w.timeline||[]).length){
    y+=2;sectionTitle('Timeline of the day');
    w.timeline.forEach(t=>{
      need(7);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(clip(t.time||'',12),M+4,y);
      doc.setFont('helvetica','normal');
      doc.text(clip(t.label||'',70),M+34,y);
      y+=7;
    });
  }

  // ---- Questionnaire ----
  const q=w.questionnaire;
  if(q&&(q.questions||[]).length){
    y+=2;sectionTitle('Questionnaire — '+clip(q.name||'',40));
    const ans=w.answers||{};
    q.questions.forEach(qq=>{
      if(qq.type==='header'){
        need(10);
        doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(91,140,255);
        doc.text(clip(qq.label,60).toUpperCase(),M,y);y+=7;
        return;
      }
      need(13);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(INK[0],INK[1],INK[2]);
      const qlines=doc.splitTextToSize(clip(qq.label,120),PW-2*M-4);
      doc.text(qlines,M+4,y);y+=qlines.length*5;
      doc.setFont('helvetica','normal');doc.setTextColor(70,80,100);
      const a=ans[qq.id]?String(ans[qq.id]):'—';
      const alines=doc.splitTextToSize(a,PW-2*M-8);
      doc.text(alines,M+8,y);y+=alines.length*5+4;
    });
  }

  // ---- Footer on every page ----
  const markData=await loadImageData('/img/spinlist-mark.png');
  const pages=doc.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(150);
    doc.text('Powered by',PW-M-30,291);
    if(markData){try{doc.addImage(markData,'PNG',PW-M-12,285.5,7,7);}catch(e){}}
    doc.setFont('helvetica','bold');doc.setTextColor(90);doc.text('spinlist',PW-M-4,291,{align:'right'});
    doc.setFont('helvetica','normal');doc.setTextColor(180);doc.text('Page '+p+' of '+pages,M,291);
  }
  doc.save((w.name||'wedding').replace(/\W+/g,'-')+'-run-sheet.pdf');
  toast('Run-sheet downloaded ⬇');
}

/* ---------------- TIMELINE (DJ + couple both edit) ---------------- */
function renderTimeline(){
  const w=CURRENT;
  const tl=w.timeline||[];
  const el=document.getElementById('timeline-panel');
  if(!el)return;
  if(!tl.length){
    el.innerHTML='<p class="muted">No timeline yet. Add the first moment of the day above.</p>';
    return;
  }
  if(DEMO){
    el.innerHTML=tl.map(t=>`
      <div style="display:flex;gap:14px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line)">
        <span style="width:90px;font-weight:700;color:var(--neon)">${esc(t.time)}</span>
        <span>${esc(t.label)}</span>
      </div>`).join('');
    return;
  }
  el.innerHTML=tl.map((t,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input value="${esc(t.time)}" placeholder="7:30pm" oninput="CURRENT.timeline[${i}].time=this.value;queueTimelineSave()"
        style="width:110px;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)">
      <input value="${esc(t.label)}" placeholder="e.g. First dance" oninput="CURRENT.timeline[${i}].label=this.value;queueTimelineSave()"
        style="flex:1;font:inherit;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)">
      <button class="iconbtn" title="Remove" onclick="removeTimelineRow(${i})">🗑</button>
    </div>`).join('');
}
function addTimelineRow(){
  if(!CURRENT.timeline)CURRENT.timeline=[];
  CURRENT.timeline.push({id:'tl'+Date.now(),time:'',label:''});
  renderTimeline();
  queueTimelineSave();
}
function removeTimelineRow(i){
  CURRENT.timeline.splice(i,1);
  renderTimeline();
  saveTimeline();
}
let tlSaveT;
function queueTimelineSave(){clearTimeout(tlSaveT);tlSaveT=setTimeout(saveTimeline,700);}
async function saveTimeline(){
  try{
    const d=await api('/api/weddings/'+CURRENT.id+'/timeline',{method:'POST',body:JSON.stringify({timeline:CURRENT.timeline})});
    CURRENT=d.wedding;
    toast('Timeline saved');
  }catch(e){ toast(e.message); }
}

/* ---------------- QUESTIONNAIRE (couple answers / DJ views) ---------------- */
function renderQuestionnaire(){
  const w=CURRENT, isDJ=isDjView();
  const el=document.getElementById('questionnaire-content');
  if(!el)return;
  const q=w.questionnaire;
  if(!q||!q.questions||!q.questions.length){
    el.innerHTML=`<h2>Questionnaire</h2>
      <div class="panel"><p class="muted">${isDJ?'No questionnaire attached yet. <a href="#" onclick="openTemplates();return false">Manage templates</a> to set one up.':'Your DJ has not added a questionnaire yet.'}</p></div>`;
    return;
  }
  const answers=w.answers||{};
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap"><h2>${esc(q.name||'Questionnaire')}</h2>${isDJ?`<div style="display:flex;gap:8px;align-items:center"><span class="muted" style="font-size:.85rem">${answersEditMode?'Editing answers':'Couple&#39;s answers'}</span><button class="btn ${answersEditMode?'btn-neon':'btn-ghost'} btn-sm" onclick="toggleAnswerEdit()">${answersEditMode?'Done':'✎ Edit answers'}</button></div>`:''}</div>
    ${!isDJ?'<p class="lead" style="margin-bottom:8px">Answer these for your DJ — saves automatically.</p>':''}
    ${isDJ&&answersEditMode?'<p class="muted" style="margin-bottom:8px;font-size:.85rem">You are editing on the couple&#39;s behalf. Changes save automatically.</p>':''}
    <div class="panel">${q.questions.map(qq=>questionField(qq,answers[qq.id],isDJ&&!answersEditMode)).join('')}</div>`;
}
let answersEditMode=false;
function toggleAnswerEdit(){ answersEditMode=!answersEditMode; renderQuestionnaire(); }
function questionField(q,val,readOnly){
  if(q.type==='header'){
    return `<div style="padding:18px 0 4px;border-top:2px solid var(--line);margin-top:6px">
      <div style="font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--plum)">${esc(q.label)}</div>
    </div>`;
  }
  val=val||'';
  const lbl=`<div style="font-weight:700;margin-bottom:8px">${esc(q.label)}</div>`;
  let input;
  if(readOnly){
    // DJ sees read-only answers (unless they toggled Edit answers)
    input=`<div class="muted" style="background:var(--paper-2);border-radius:8px;padding:10px 12px;min-height:20px">${val?esc(val):'<i>No answer yet</i>'}</div>`;
  }else if(q.type==='yesno'){
    input=`<div style="display:flex;gap:8px">
      ${['Yes','No'].map(o=>`<button class="btn ${val===o?'btn-neon':'btn-ghost'} btn-sm" onclick="setAnswer('${q.id}','${o}')">${o}</button>`).join('')}</div>`;
  }else if(q.type==='choice'){
    input=`<div style="display:flex;gap:8px;flex-wrap:wrap">
      ${(q.options||[]).map(o=>`<button class="btn ${val===o?'btn-neon':'btn-ghost'} btn-sm" onclick="setAnswer('${q.id}','${esc(o).replace(/'/g,"&#39;")}')">${esc(o)}</button>`).join('')}</div>`;
  }else if(q.type==='multiselect'){
    // Answer stored as a comma-separated list; couples can pick several.
    const chosen=(val||'').split(',').map(s=>s.trim()).filter(Boolean);
    input=`<div style="display:flex;gap:8px;flex-wrap:wrap">
      ${(q.options||[]).map(o=>`<button class="btn ${chosen.includes(o)?'btn-neon':'btn-ghost'} btn-sm" onclick="toggleMultiAnswer('${q.id}','${esc(o).replace(/'/g,"&#39;")}')">${chosen.includes(o)?'✓ ':''}${esc(o)}</button>`).join('')}</div>`;
  }else{
    input=`<input value="${esc(val)}" placeholder="Type your answer…" oninput="CURRENT.answers=CURRENT.answers||{};CURRENT.answers['${q.id}']=this.value;queueAnswerSave()"
      style="width:100%;font:inherit;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper-2);color:var(--ink)">`;
  }
  return `<div style="padding:14px 0;border-top:1px solid var(--line)">${lbl}${input}</div>`;
}
function setAnswer(qid,val){
  CURRENT.answers=CURRENT.answers||{};
  CURRENT.answers[qid]=val;
  renderQuestionnaire();
  saveAnswers();
}
// Toggle one option in a multi-select answer (stored comma-separated).
function toggleMultiAnswer(qid,opt){
  CURRENT.answers=CURRENT.answers||{};
  const chosen=(CURRENT.answers[qid]||'').split(',').map(s=>s.trim()).filter(Boolean);
  const i=chosen.indexOf(opt);
  if(i===-1)chosen.push(opt); else chosen.splice(i,1);
  CURRENT.answers[qid]=chosen.join(', ');
  renderQuestionnaire();
  saveAnswers();
}
let ansT;
function queueAnswerSave(){clearTimeout(ansT);ansT=setTimeout(saveAnswers,700);}
async function saveAnswers(){
  try{
    const d=await api('/api/weddings/'+CURRENT.id+'/answers',{method:'POST',body:JSON.stringify({answers:CURRENT.answers})});
    CURRENT=d.wedding;
    toast('Saved');
  }catch(e){ toast(e.message); }
}


/* ---------------- SONG SEARCH + SAVE ---------------- */
function openSearch(blockId){
  activeBlockId=blockId;
  const b=CURRENT.blocks.find(x=>x.id===blockId);
  document.getElementById('search-title').textContent='Add to “'+b.name+'”';
  document.getElementById('search-sub').textContent=b.songs.length+' of '+b.capacity+' added';
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
  document.getElementById('search-modal').classList.add('show');
  setTimeout(()=>document.getElementById('search-input').focus(),50);
}
function closeSearch(){document.getElementById('search-modal').classList.remove('show');}
let searchT;
function debouncedSearch(){clearTimeout(searchT);searchT=setTimeout(runSearch,300);}
async function runSearch(){
  const q=val('search-input');const box=document.getElementById('search-results');
  if(!q){box.innerHTML='';return;}
  try{
    const d=await api('/api/search?q='+encodeURIComponent(q)+'&limit=8');
    box.innerHTML=(d.tracks||[]).map(t=>`
      <div class="result" onclick='addSong(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
        <img src="${esc(t.art||'')}" onerror="this.style.visibility='hidden'">
        <div class="meta" style="flex:1;min-width:0"><div class="t" style="font-weight:600">${esc(t.title)}</div><div class="a muted">${esc(t.artist)}</div></div>
        <span class="btn btn-neon btn-sm">Add</span>
      </div>`).join('')||'<p class="muted" style="padding:8px">No results.</p>';
  }catch(e){ box.innerHTML='<p class="muted" style="padding:8px">Search failed — try again.</p>'; }
}
async function addSong(t){
  const b=CURRENT.blocks.find(x=>x.id===activeBlockId);
  if(b.songs.length>=b.capacity){toast('That block is full');return;}
  if(b.songs.some(s=>s.id===t.id)){toast('Already added');return;}
  b.songs.push({id:t.id,uri:t.uri,title:t.title,artist:t.artist,art:t.art});
  await saveBlock(b);
  document.getElementById('search-sub').textContent=b.songs.length+' of '+b.capacity+' added';
  if(b.songs.length>=b.capacity)closeSearch();
}
async function removeSong(blockId,i){
  const b=CURRENT.blocks.find(x=>x.id===blockId);
  b.songs.splice(i,1);
  await saveBlock(b);
}
async function saveBlock(b){
  try{
    const d=await api('/api/weddings/'+CURRENT.id+'/block/'+b.id,{method:'POST',body:JSON.stringify({songs:b.songs})});
    CURRENT=d.wedding;
    renderBlocks();
    toast('Saved');
  }catch(e){ toast(e.message); }
}

function val(id){return (document.getElementById(id)||{}).value||'';}
window.addEventListener('load',boot);
</script>
