<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gig Window · Spinlist</title>
<link rel="icon" href="/img/favicon-32.png" sizes="32x32">
<style>
  :root{ --neon:#c1ff2f; --ink:#e8ecf5; --muted:#8b93a7; --line:rgba(255,255,255,.1); --bg:#070b16; --panel:#0d1424; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;background:var(--neon);color:#0a1228}
  header .title{font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:8px;min-width:0}
  header .title span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header .meta{font-size:.8rem;font-weight:700;opacity:.75;white-space:nowrap}
  main{padding:8px 0 40px}
  .row{padding:16px 22px;border-bottom:1px solid var(--line)}
  .row .q{font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--neon);font-weight:800}
  .row .a{font-size:1.35rem;line-height:1.35;color:#fff;margin-top:6px;word-wrap:break-word}
  .row .a.empty{color:#5b6479;font-size:1.05rem;font-style:italic}
  .a-input{width:100%;font-size:1.35rem;line-height:1.35;color:#fff;margin-top:6px;background:transparent;border:none;border-bottom:1px dashed transparent;padding:2px 0;font-family:inherit}
  .a-input::placeholder{color:#5b6479;font-style:italic;font-size:1.05rem}
  .a-input:focus{outline:none;border-bottom-color:var(--neon)}
  .tabs{position:sticky;top:0;display:flex;background:var(--panel);border-bottom:1px solid var(--line);z-index:5}
  .tab{flex:1;text-align:center;padding:11px 4px;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
  .tab.on{color:#fff;border-bottom-color:var(--neon)}
  .row.tl{display:flex;gap:12px;align-items:baseline}
  .row.tl .time{color:var(--neon);font-weight:800;font-size:1rem;min-width:70px}
  .row.tl .lbl{color:#fff;font-size:1rem}
  .song{display:flex;gap:8px;align-items:center;padding:5px 0;font-size:1rem;color:#fff}
  .song .tick{width:16px;color:#3a4560;font-weight:800;flex-shrink:0}
  .song .tick.done{color:var(--neon)}
  .song .stitle{flex:1}
  .song .copybtn{cursor:pointer;opacity:.7;flex-shrink:0;font-size:.9rem}
  .song .copybtn:hover{opacity:1}
  .song .art{color:#8b93a7}
  .song .pl{color:#8b93a7;text-decoration:line-through}
  .song.empty{color:#5b6479;font-style:italic;font-size:.9rem}
  .status{padding:60px 22px;text-align:center;color:var(--muted)}
  .foot{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);font-size:.72rem;color:var(--muted)}
  .foot button{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:5px 10px;font:inherit;font-size:.72rem;cursor:pointer}
  .foot button:hover{color:var(--ink)}
  @media(max-width:420px){ .row .a{font-size:1.15rem} }
</style>
</head>
<body>
  <header>
    <div class="title">📺 <span id="wed-name">Gig window</span></div>
    <div class="meta" id="wed-date"></div>
  </header>
  <div class="tabs">
    <span class="tab on" data-tab="info" onclick="setTab('info')">ℹ️ Info</span>
    <span class="tab" data-tab="timeline" onclick="setTab('timeline')">🕐 Timeline</span>
    <span class="tab" data-tab="music" onclick="setTab('music')">🎵 Music</span>
  </div>
  <main id="main"><div class="status">Loading…</div></main>
  <div class="foot"><span id="updated">—</span><button onclick="load()">Refresh now</button></div>
<script>
const params=new URLSearchParams(location.search);
const WID=params.get('w');
let LAST_ANSWERS={};
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let WED=null, TAB='info';
function setTab(t){
  TAB=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.tab===t));
  if(WED)renderBody();
}
function infoHtml(){
  const q=WED.questionnaire, answers=WED.answers||{};
  const flagged=((q&&q.questions)||[]).filter(qq=>qq.gigShow&&qq.type!=='header');
  if(!flagged.length)return '<div class="status">No questions are flagged for the gig window yet.<br>Tick “📺 Gig window” on questions in your template, then save.</div>';
  return flagged.map(qq=>{
    const a=answers[qq.id]||'';
    return '<div class="row"><div class="q">'+esc(qq.label)+'</div>'+
      '<input class="a-input" value="'+esc(a)+'" placeholder="tap to add…" data-qid="'+esc(qq.id)+'" onchange="saveAnswer(this.dataset.qid,this.value)"></div>';
  }).join('');
}
function timelineHtml(){
  const tl=(WED.timeline||[]);
  if(!tl.length)return '<div class="status">No timeline added yet.</div>';
  return tl.map(t=>'<div class="row tl"><div class="time">'+esc(t.time||'')+'</div><div class="lbl">'+esc(t.label||'')+'</div></div>').join('');
}
function musicHtml(){
  const blocks=(WED.blocks||[]);
  if(!blocks.length)return '<div class="status">No music blocks yet.</div>';
  return blocks.map(b=>{
    const songs=(b.songs||[]);
    const list=songs.length?songs.map(s=>{
      const copyTxt=(s.title||'')+(s.artist?' '+s.artist:'');
      return '<div class="song">'+
        '<span class="tick '+(s.played?'done':'')+'" onclick="togglePlayed(\''+esc(b.id)+'\',\''+esc(s.id)+'\','+(s.played?0:1)+')" style="cursor:pointer">'+(s.played?'✓':'○')+'</span>'+
        '<span class="stitle'+(s.played?' pl':'')+'" onclick="togglePlayed(\''+esc(b.id)+'\',\''+esc(s.id)+'\','+(s.played?0:1)+')" style="cursor:pointer">'+esc(s.title||'')+(s.artist?' <span class="art">· '+esc(s.artist)+'</span>':'')+'</span>'+
        '<span class="copybtn" title="Copy title & artist" onclick="copySong(this,\''+esc(copyTxt).replace(/'/g,"\\'")+'\')">📋</span>'+
      '</div>';
    }).join(''):'<div class="song empty">No songs chosen</div>';
    return '<div class="row"><div class="q">'+esc(b.name||'Block')+' <span class="art">('+songs.filter(s=>s.played).length+'/'+songs.length+' played)</span></div>'+list+'</div>';
  }).join('');
}
async function togglePlayed(blockId,songId,played){
  try{
    const r=await fetch('/api/weddings/'+encodeURIComponent(WID)+'/played',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({blockId,songId,played:!!played})});
    if(r.ok){ const d=await r.json(); if(d&&d.wedding){ WED=d.wedding; renderBody(); document.getElementById('updated').textContent='Saved '+new Date().toLocaleTimeString(); } }
    else{ document.getElementById('updated').textContent='Save failed'; }
  }catch(e){ document.getElementById('updated').textContent='Save failed'; }
}
async function copySong(el,text){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){ const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(ta); }
  if(el){ const o=el.textContent; el.textContent='✓'; setTimeout(()=>{el.textContent=o;},900); }
  document.getElementById('updated').textContent='Copied: '+text;
}
function renderBody(){
  document.getElementById('main').innerHTML = TAB==='timeline'?timelineHtml() : TAB==='music'?musicHtml() : infoHtml();
}
function paint(w){
  WED=w;
  document.getElementById('wed-name').textContent=w.coupleNames||w.name||'Gig window';
  document.getElementById('wed-date').textContent=w.weddingDate?new Date(w.weddingDate).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}):'';
  document.title='📺 '+(w.coupleNames||w.name||'Gig')+' · Spinlist';
  LAST_ANSWERS=Object.assign({},w.answers||{});
  renderBody();
  document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString();
}
async function saveAnswer(qid,val){
  LAST_ANSWERS[qid]=val;
  try{
    const r=await fetch('/api/weddings/'+encodeURIComponent(WID)+'/answers',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({answers:LAST_ANSWERS})});
    if(r.ok){ const d=await r.json(); if(d&&d.wedding){ WED=d.wedding; LAST_ANSWERS=d.wedding.answers||LAST_ANSWERS; } document.getElementById('updated').textContent='Saved '+new Date().toLocaleTimeString(); }
    else{ document.getElementById('updated').textContent='Save failed'; }
  }catch(e){ document.getElementById('updated').textContent='Save failed'; }
}
async function load(){
  const main=document.getElementById('main');
  // Prefer seeded data handed over by the opener (always matches the in-page window).
  if(window.__SEED_WEDDING){ try{ paint(window.__SEED_WEDDING); }catch(e){} }
  if(!WID){ if(!window.__SEED_WEDDING)main.innerHTML='<div class="status">No wedding specified.</div>'; return; }
  try{
    const r=await fetch('/api/weddings/'+encodeURIComponent(WID),{credentials:'same-origin'});
    if(r.status===401||r.status===403){ if(!window.__SEED_WEDDING)main.innerHTML='<div class="status">Please <a href="/" style="color:var(--neon)">log in</a> on the main site, then reopen this window.</div>'; return; }
    if(!r.ok){ if(!window.__SEED_WEDDING)main.innerHTML='<div class="status">Could not load this wedding.</div>'; return; }
    const d=await r.json();
    if(d&&d.wedding)paint(d.wedding);
  }catch(e){ if(!window.__SEED_WEDDING)main.innerHTML='<div class="status">Connection problem — will retry.</div>'; }
}
load();
setInterval(load,30000);   // auto-refresh every 30s
</script>
</body>
</html>
