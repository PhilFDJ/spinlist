<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GigConfirm · Create your agency</title>
<link rel="icon" type="image/png" href="/icon.png?v=2">
<style>
  :root{--ink:#0f1720;--ink2:#16212e;--line2:#2c3a4a;--cream:#eef3f8;--muted:#93a3b4;--amber:#e8a13a;--go:#25d366;--stop:#e2614b;--navy:#0b1220}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--ink);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:24px}
  .card{width:420px;max-width:92vw;background:var(--ink2);border:1px solid var(--line2);border-radius:16px;padding:28px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:20px;color:var(--amber)}
  .sub{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin:4px 0 20px}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px}
  input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line2);background:var(--ink);color:var(--cream);font-size:15px}
  .prefix-row{display:flex;align-items:center;gap:0}
  .prefix-row input{border-top-right-radius:0;border-bottom-right-radius:0}
  .prefix-suffix{padding:12px;border:1px solid var(--line2);border-left:none;border-top-right-radius:10px;border-bottom-right-radius:10px;background:var(--ink);color:var(--muted);font-size:14px;white-space:nowrap}
  .avail{font-size:12px;min-height:16px;margin-top:5px}
  button{width:100%;padding:13px;border:none;border-radius:10px;background:var(--amber);color:var(--ink);font-weight:700;font-size:15px;cursor:pointer;margin-top:20px}
  button:disabled{opacity:.5;cursor:not-allowed}
  .err{color:var(--stop);font-size:13px;min-height:18px;margin-top:10px}
  .foot{margin-top:16px;text-align:center;font-size:13px;color:var(--muted)}
  a{color:var(--amber)}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><img src="/logo-light.png" alt="GigConfirm" style="height:40px;width:auto"></div>
  <div class="sub">Create your agency</div>

  <label>Agency name</label>
  <input id="agencyName" placeholder="e.g. Sparkle Entertainment" autocomplete="organization" />

  <label>Your sending address</label>
  <div class="prefix-row">
    <input id="prefix" placeholder="sparkle" autocomplete="off" />
    <span class="prefix-suffix">@gigconfirm.co.uk</span>
  </div>
  <div class="avail" id="avail"></div>

  <label>Your name</label>
  <input id="userName" placeholder="Your name" autocomplete="name" />

  <label>Your email (for logging in)</label>
  <input id="email" type="email" placeholder="you@youragency.com" autocomplete="email" />

  <label>Choose a password (8+ characters)</label>
  <input id="password" type="password" placeholder="Password" autocomplete="new-password" />

  <button id="go">Create agency &amp; start</button>
  <div class="err" id="err"></div>
  <div class="foot">Already have an account? <a href="/login.html">Sign in</a></div>
</div>
<script>
  const $=id=>document.getElementById(id);
  let prefixOk=false;

  // live prefix availability check (debounced)
  let t=null;
  $("prefix").addEventListener("input",()=>{
    const clean=$("prefix").value.toLowerCase().replace(/[^a-z0-9-]/g,"");
    if($("prefix").value!==clean)$("prefix").value=clean;
    prefixOk=false;
    $("avail").textContent="";
    clearTimeout(t);
    const v=clean;
    if(!v){return;}
    t=setTimeout(async()=>{
      try{
        const d=await (await fetch("/api/check-prefix?prefix="+encodeURIComponent(v))).json();
        if(d.available){prefixOk=true;$("avail").style.color="var(--go)";$("avail").textContent="✓ "+v+"@gigconfirm.co.uk is available";}
        else{prefixOk=false;$("avail").style.color="var(--stop)";$("avail").textContent=d.reason||"Not available";}
      }catch(_){}
    },350);
  });

  async function signup(){
    $("err").textContent="";
    if(!prefixOk){$("err").textContent="Please choose an available email prefix.";return;}
    $("go").disabled=true;
    const body={
      agencyName:$("agencyName").value,
      prefix:$("prefix").value,
      userName:$("userName").value,
      email:$("email").value,
      password:$("password").value,
    };
    try{
      const r=await fetch("/api/signup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      if(r.ok){location.href="/billing.html";}
      else{$("err").textContent=d.error||"Signup failed.";$("go").disabled=false;}
    }catch(e){$("err").textContent=e.message;$("go").disabled=false;}
  }
  $("go").onclick=signup;
</script>
</body>
</html>
