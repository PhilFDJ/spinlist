 
      - name: Install dependencies
        run: npm install
 
      - name: Build the app
        run: ${{ matrix.build }}
        env:
          # Don't try to code-sign / notarise (we have no certificates). Build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: false
 
      - name: Collect the installers
        # Grab just the finished installer files, not the loose build folders.
        uses: actions/upload-artifact@v4
        with:
          name: spinlist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore
 
  # After both builds finish, attach all the installers to a GitHub Release.
  release:
    needs: build
    runs-on: ubuntu-latest
    # Only make a Release when triggered by a version tag (not manual test runs).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all built installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
 
      - name: Publish them to a Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
 
